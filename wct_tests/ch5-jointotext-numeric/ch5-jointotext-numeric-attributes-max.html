<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <script src="/webcomponentsjs/webcomponents-lite.js"></script>
    <script src="/bower_components/web-component-tester/browser.js"></script>
    <link rel="stylesheet" type="text/css" href="/wct_tests/themes/crestron-components-assets/base.css">
    <script src="/wct_tests/js/helpers.js"></script>
    <script src="/build_bundles/umd/cr-com-lib.js"></script>
</head>

<body>

    <test-fixture id="ch5-jointotext-numeric-max-default-fixture">
        <template>
            <ch5-jointotext-numeric></ch5-jointotext-numeric>
        </template>
    </test-fixture>

    <test-fixture id="ch5-jointotext-numeric-max-set-fixture">
        <template>
            <ch5-jointotext-numeric max="100"></ch5-jointotext-numeric>
        </template>
    </test-fixture>

    <test-fixture id="ch5-jointotext-numeric-max-zero-fixture">
        <template>
            <ch5-jointotext-numeric max="0"></ch5-jointotext-numeric>
        </template>
    </test-fixture>

    <test-fixture id="ch5-jointotext-numeric-max-large-fixture">
        <template>
            <ch5-jointotext-numeric max="65535"></ch5-jointotext-numeric>
        </template>
    </test-fixture>

    <test-fixture id="ch5-jointotext-numeric-max-negative-fixture">
        <template>
            <ch5-jointotext-numeric max="-50" type="signed"></ch5-jointotext-numeric>
        </template>
    </test-fixture>

    <test-fixture id="ch5-jointotext-numeric-max-min-fixture">
        <template>
            <ch5-jointotext-numeric min="0" max="255"></ch5-jointotext-numeric>
        </template>
    </test-fixture>

    <script>
        suite('ch5-jointotext-numeric max default', () => {
            let ch5JoinToTextNumeric;

            setup(() => {
                ch5JoinToTextNumeric = fixture('ch5-jointotext-numeric-max-default-fixture');
                return Promise.all([customElements.whenDefined('ch5-jointotext-numeric')]);
            });

            test('max default should be 65535', () => {
                expect(ch5JoinToTextNumeric.max).to.be.equal(65535);
            });
        });

        suite('ch5-jointotext-numeric max set', () => {
            let ch5JoinToTextNumeric;

            setup(() => {
                ch5JoinToTextNumeric = fixture('ch5-jointotext-numeric-max-set-fixture');
                return Promise.all([customElements.whenDefined('ch5-jointotext-numeric')]);
            });

            test('max should be 100', () => {
                expect(ch5JoinToTextNumeric.max).to.be.equal(100);
            });
        });

        suite('ch5-jointotext-numeric max zero', () => {
            let ch5JoinToTextNumeric;

            setup(() => {
                ch5JoinToTextNumeric = fixture('ch5-jointotext-numeric-max-zero-fixture');
                return Promise.all([customElements.whenDefined('ch5-jointotext-numeric')]);
            });

            test('max should be 0', () => {
                expect(ch5JoinToTextNumeric.max).to.be.equal(0);
            });
        });

        suite('ch5-jointotext-numeric max large', () => {
            let ch5JoinToTextNumeric;

            setup(() => {
                ch5JoinToTextNumeric = fixture('ch5-jointotext-numeric-max-large-fixture');
                return Promise.all([customElements.whenDefined('ch5-jointotext-numeric')]);
            });

            test('max should be 65535', () => {
                expect(ch5JoinToTextNumeric.max).to.be.equal(65535);
            });
        });

        suite('ch5-jointotext-numeric max negative', () => {
            let ch5JoinToTextNumeric;

            setup(() => {
                ch5JoinToTextNumeric = fixture('ch5-jointotext-numeric-max-negative-fixture');
                return Promise.all([customElements.whenDefined('ch5-jointotext-numeric')]);
            });

            test('max should be -50', () => {
                expect(ch5JoinToTextNumeric.max).to.be.equal(-50);
            });
        });

        suite('ch5-jointotext-numeric max with min', () => {
            let ch5JoinToTextNumeric;

            setup(() => {
                ch5JoinToTextNumeric = fixture('ch5-jointotext-numeric-max-min-fixture');
                return Promise.all([customElements.whenDefined('ch5-jointotext-numeric')]);
            });

            test('min should be 0', () => {
                expect(ch5JoinToTextNumeric.min).to.be.equal(0);
            });

            test('max should be 255', () => {
                expect(ch5JoinToTextNumeric.max).to.be.equal(255);
            });
        });

        suite('ch5-jointotext-numeric max dynamic update', () => {
            let ch5JoinToTextNumeric;

            setup(() => {
                ch5JoinToTextNumeric = fixture('ch5-jointotext-numeric-max-default-fixture');
                return Promise.all([customElements.whenDefined('ch5-jointotext-numeric')]);
            });

            test('max can be set dynamically via attribute', (done) => {
                ch5JoinToTextNumeric.setAttribute('max', '500');
                flush(() => {
                    setTimeout(() => {
                        expect(ch5JoinToTextNumeric.getAttribute('max')).to.be.equal('500');
                        expect(ch5JoinToTextNumeric.max).to.be.equal(500);
                        done();
                    }, 100);
                });
            });

            test('max can be set dynamically via property', (done) => {
                ch5JoinToTextNumeric.max = 1000;
                flush(() => {
                    setTimeout(() => {
                        expect(ch5JoinToTextNumeric.max).to.be.equal(1000);
                        done();
                    }, 100);
                });
            });
        });
    </script>
</body>

</html>
