<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="/webcomponentsjs/webcomponents-lite.js"></script>
    <script src="/bower_components/web-component-tester/browser.js"></script>
    <link
      rel="stylesheet"
      type="text/css"
      href="/wct_tests/themes/crestron-components-assets/base.css"
    />
    <script src="/wct_tests/js/helpers.js"></script>
    <script src="/build_bundles/umd/cr-com-lib.js"></script>
  </head>

  <body>
    <test-fixture id="ch5-jointotext-numeric-receiveStateValue-default-fixture">
      <template>
        <ch5-jointotext-numeric></ch5-jointotext-numeric>
      </template>
    </test-fixture>

    <test-fixture id="ch5-jointotext-numeric-receiveStateValue-set-fixture">
      <template>
        <ch5-jointotext-numeric
          receivestatevalue="numeric_signal"
        ></ch5-jointotext-numeric>
      </template>
    </test-fixture>

    <script>
      suite("ch5-jointotext-numeric receiveStateValue default", () => {
        let ch5JoinToTextNumeric;

        setup(() => {
          ch5JoinToTextNumeric = fixture(
            "ch5-jointotext-numeric-receiveStateValue-default-fixture"
          );
          return Promise.all([
            customElements.whenDefined("ch5-jointotext-numeric"),
          ]);
        });

        test("receiveStateValue default should be empty", () => {
          expect(ch5JoinToTextNumeric.receiveStateValue).to.be.equal("");
        });
      });

      suite("ch5-jointotext-numeric receiveStateValue set", () => {
        let ch5JoinToTextNumeric;

        setup(() => {
          ch5JoinToTextNumeric = fixture(
            "ch5-jointotext-numeric-receiveStateValue-set-fixture"
          );
          return Promise.all([
            customElements.whenDefined("ch5-jointotext-numeric"),
          ]);
        });

        test('receiveStateValue should be "numeric_signal"', () => {
          expect(ch5JoinToTextNumeric.receiveStateValue).to.be.equal(
            "numeric_signal"
          );
        });
      });

      suite("ch5-jointotext-numeric receiveStateValue emulator", () => {
        let ch5JoinToTextNumeric;

        setup(function () {
          this.timeout(4000);
          ch5JoinToTextNumeric = fixture(
            "ch5-jointotext-numeric-receiveStateValue-set-fixture"
          );
          return Promise.all([
            customElements.whenDefined("ch5-jointotext-numeric"),
          ]);
        });

        test("receiveStateValue receives signal from emulator", function (done) {
          this.timeout(4000);
          CrComLib.Ch5Emulator.getInstance().loadScenario({
            cues: [
              {
                type: "n",
                event: "numeric_signal",
                trigger: "&change",
                actions: [
                  {
                    state: "numeric_signal",
                    type: "number",
                    logic: "set",
                    value: 12345,
                  },
                ],
              },
            ],
            onStart: [
              {
                state: "numeric_signal",
                type: "number",
                logic: "set",
                value: 12345,
              },
            ],
          });
          CrComLib.Ch5Emulator.getInstance().run();

          setTimeout(() => {
            expect(ch5JoinToTextNumeric.value).to.be.equal("12345");
            done();
          }, 2000);
        });
      });

      suite("ch5-jointotext-numeric receiveStateValue dynamic update", () => {
        let ch5JoinToTextNumeric;

        setup(() => {
          ch5JoinToTextNumeric = fixture(
            "ch5-jointotext-numeric-receiveStateValue-default-fixture"
          );
          return Promise.all([
            customElements.whenDefined("ch5-jointotext-numeric"),
          ]);
        });

        test("receiveStateValue can be set dynamically via attribute", (done) => {
          ch5JoinToTextNumeric.setAttribute(
            "receivestatevalue",
            "new_numeric_signal"
          );
          flush(() => {
            setTimeout(() => {
              expect(
                ch5JoinToTextNumeric.getAttribute("receivestatevalue")
              ).to.be.equal("new_numeric_signal");
              expect(ch5JoinToTextNumeric.receiveStateValue).to.be.equal(
                "new_numeric_signal"
              );
              done();
            }, 100);
          });
        });

        test("receiveStateValue can be set dynamically via property", (done) => {
          ch5JoinToTextNumeric.receiveStateValue = "another_signal";
          flush(() => {
            setTimeout(() => {
              expect(ch5JoinToTextNumeric.receiveStateValue).to.be.equal(
                "another_signal"
              );
              done();
            }, 100);
          });
        });
      });
    </script>
  </body>
</html>
