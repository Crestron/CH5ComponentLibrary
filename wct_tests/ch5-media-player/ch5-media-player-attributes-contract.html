<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <script src="/webcomponentsjs/webcomponents-lite.js"></script>
  <script src="/bower_components/web-component-tester/browser.js"></script>
  <link rel="stylesheet" type="text/css" href="/wct_tests/themes/crestron-components-assets/base.css">

  <script src="/build_bundles/umd/cr-com-lib.js"></script>
</head>

<body>
  <test-fixture id="ch5-media-player-contract-name">
    <template>
      <ch5-media-player></ch5-media-player>
    </template>
  </test-fixture>

  <test-fixture id="ch5-media-player-contract-with-use-flags">
    <template>
      <ch5-media-player contractname="MediaPlayer"></ch5-media-player>
    </template>
  </test-fixture>

  <script>
    suite('ch5-media-player-contract-name-attributes', () => {
      let ch5MediaPlayer;

      setup(async () => {
        ch5MediaPlayer = fixture('ch5-media-player-contract-name');
      });

      test('Check default contractName is empty string', () => {
        expect(ch5MediaPlayer.contractName).to.be.equal('');
      });

      test('Check setting contractName attribute', () => {
        ch5MediaPlayer.setAttribute('contractname', 'TestContract');
        expect(ch5MediaPlayer.contractName).to.be.equal('TestContract');
      });

      test('Check contractName updates signal names', (done) => {
        ch5MediaPlayer.setAttribute('contractname', 'MediaPlayer');
        flush(() => {
          setTimeout(() => {
            expect(ch5MediaPlayer.receiveStateCRPC).to.be.equal('MediaPlayer.CRPC_FB');
            expect(ch5MediaPlayer.sendEventCRPC).to.be.equal('MediaPlayer.CRPC');
            expect(ch5MediaPlayer.receiveStateMessage).to.be.equal('MediaPlayer.Message_FB');
            expect(ch5MediaPlayer.receiveStateRefreshMediaPlayer).to.be.equal('MediaPlayer.Refresh');
            expect(ch5MediaPlayer.receiveStateDeviceOffline).to.be.equal('MediaPlayer.Offline');
            expect(ch5MediaPlayer.receiveStatePlayerName).to.be.equal('MediaPlayer.Player_Name');
            done();
          }, 100);
        });
      });

      test('Check clearing contractName resets signal names', (done) => {
        ch5MediaPlayer.setAttribute('contractname', 'MediaPlayer');
        flush(() => {
          setTimeout(() => {
            ch5MediaPlayer.setAttribute('contractname', '');
            flush(() => {
              setTimeout(() => {
                expect(ch5MediaPlayer.receiveStateCRPC).to.be.equal('');
                expect(ch5MediaPlayer.sendEventCRPC).to.be.equal('');
                done();
              }, 100);
            });
          }, 100);
        });
      });
    });

    suite('ch5-media-player-useContract-flags', () => {
      let ch5MediaPlayer;

      setup(async () => {
        ch5MediaPlayer = fixture('ch5-media-player-contract-with-use-flags');
      });

      test('Check default useContractForShow is false', () => {
        expect(ch5MediaPlayer.useContractForShow).to.be.equal(false);
      });

      test('Check default useContractForEnable is false', () => {
        expect(ch5MediaPlayer.useContractForEnable).to.be.equal(false);
      });

      test('Check default useContractForCustomStyle is false', () => {
        expect(ch5MediaPlayer.useContractForCustomStyle).to.be.equal(false);
      });

      test('Check default useContractForCustomClass is false', () => {
        expect(ch5MediaPlayer.useContractForCustomClass).to.be.equal(false);
      });

      test('Check useContractForShow sets receiveStateShow', (done) => {
        ch5MediaPlayer.setAttribute('usecontractforshow', 'true');
        flush(() => {
          setTimeout(() => {
            expect(ch5MediaPlayer.receiveStateShow).to.be.equal('MediaPlayer.Visible');
            done();
          }, 100);
        });
      });

      test('Check useContractForEnable sets receiveStateEnable', (done) => {
        ch5MediaPlayer.setAttribute('usecontractforenable', 'true');
        flush(() => {
          setTimeout(() => {
            expect(ch5MediaPlayer.receiveStateEnable).to.be.equal('MediaPlayer.Enabled');
            done();
          }, 100);
        });
      });

      test('Check useContractForCustomClass sets receiveStateCustomClass', (done) => {
        ch5MediaPlayer.setAttribute('usecontractforcustomclass', 'true');
        flush(() => {
          setTimeout(() => {
            expect(ch5MediaPlayer.receiveStateCustomClass).to.be.equal('MediaPlayer.CustomClass');
            done();
          }, 100);
        });
      });

      test('Check useContractForCustomStyle sets receiveStateCustomStyle', (done) => {
        ch5MediaPlayer.setAttribute('usecontractforcustomstyle', 'true');
        flush(() => {
          setTimeout(() => {
            expect(ch5MediaPlayer.receiveStateCustomStyle).to.be.equal('MediaPlayer.CustomStyle');
            done();
          }, 100);
        });
      });
    });
  </script>
</body>

</html>
