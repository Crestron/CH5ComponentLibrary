  <test-fixture id="ch5-media-player-responsive">

    suite('ch5-media-player-responsive-breakpoints', () => {
      let ch5MediaPlayer;

      setup(async () => {
        // Reset progress bar state to avoid stale emissions from prior suites
        CrComLib.publishEvent('o', 'progressBarData', {});
        ch5MediaPlayer = fixture('ch5-media-player-responsive');
      });

      test('Check width breakpoint class is applied', (done) => {
        flush(() => {
          setTimeout(() => {
            const container = ch5MediaPlayer.querySelector('.ch5-media-player');
            const hasWidthClass = Array.from(container.classList).some(cls => cls.startsWith('ch5-media-player--width-'));
            expect(hasWidthClass).to.be.true;
            done();
          }, 200);
        });
      });

      test('Check height breakpoint class is applied', (done) => {
        flush(() => {
          setTimeout(() => {
            const container = ch5MediaPlayer.querySelector('.ch5-media-player');
            const hasHeightClass = Array.from(container.classList).some(cls => cls.startsWith('ch5-media-player--height-'));
            expect(hasHeightClass).to.be.true;
            done();
          }, 200);
        });
      });
    });

    // Test suite for XS breakpoint (0-384px)
    suite('ch5-media-player-xs-width-breakpoint', () => {
      let ch5MediaPlayer;
      const testCases = [
        { width: '1px', expected: 'xs' },
        { width: '200px', expected: 'xs' },
        { width: '300px', expected: 'xs' },
        { width: '383px', expected: 'xs' },
        { width: '384px', expected: 'xs' }
      ];

      testCases.forEach(({ width, expected }) => {
        setup(async () => {
          CrComLib.publishEvent('o', 'progressBarData', {});
          ch5MediaPlayer = fixture('ch5-media-player-responsive');
        });

        test(`Check XS width breakpoint at ${width}`, (done) => {
          ch5MediaPlayer.setAttribute('customStyle', `width:${width}; height:500px`);
          flush(() => {
            setTimeout(() => {
              const container = ch5MediaPlayer.querySelector('.ch5-media-player');
              expect(container.classList.contains(`ch5-media-player--width-${expected}`)).to.be.true;
              done();
            }, 500);
          });
        });
      });
    });

    // Edge case tests for breakpoint boundaries
    suite('ch5-media-player-breakpoint-edge-cases', () => {
      let ch5MediaPlayer;

      setup(async () => {
        CrComLib.publishEvent('o', 'progressBarData', {});
        ch5MediaPlayer = fixture('ch5-media-player-responsive');
      });

      test('Edge: 383px width should be XS', (done) => {
        ch5MediaPlayer.setAttribute('customStyle', 'width:383px; height:500px');
        flush(() => {
          setTimeout(() => {
            const container = ch5MediaPlayer.querySelector('.ch5-media-player');
            expect(container.classList.contains('ch5-media-player--width-xs')).to.be.true;
            expect(container.classList.contains('ch5-media-player--width-sm')).to.be.false;
            done();
          }, 500);
        });
      });

      test('Edge: 384px width should be XS', (done) => {

    // Test suite for mixed breakpoint combinations
    suite('ch5-media-player-mixed-breakpoints', () => {
      let ch5MediaPlayer;
      const testCases = [
        { width: '1920px', height: '400px', expectedWidth: 'xl', expectedHeight: 'sm', description: 'Wide and short' },
        { width: '400px', height: '1080px', expectedWidth: 'sm', expectedHeight: 'lg', description: 'Narrow and tall' },
        { width: '300px', height: '1300px', expectedWidth: 'xs', expectedHeight: 'xl', description: 'Very narrow and very tall' },
        { width: '1500px', height: '300px', expectedWidth: 'xl', expectedHeight: 'xs', description: 'Very wide and very short' },
        { width: '800px', height: '600px', expectedWidth: 'md', expectedHeight: 'sm', description: 'Standard tablet landscape' },
        { width: '600px', height: '800px', expectedWidth: 'sm', expectedHeight: 'md', description: 'Standard tablet portrait' }
      ];

      testCases.forEach(({ width, height, expectedWidth, expectedHeight, description }) => {
        setup(async () => {
          CrComLib.publishEvent('o', 'progressBarData', {});
          ch5MediaPlayer = fixture('ch5-media-player-responsive');
        });

        test(`Check mixed breakpoint: ${description} (${width} x ${height})`, (done) => {
          ch5MediaPlayer.setAttribute('customStyle', `width:${width}; height:${height}`);
          flush(() => {
            setTimeout(() => {
              const container = ch5MediaPlayer.querySelector('.ch5-media-player');
              expect(container.classList.contains(`ch5-media-player--width-${expectedWidth}`)).to.be.true;
              expect(container.classList.contains(`ch5-media-player--height-${expectedHeight}`)).to.be.true;
