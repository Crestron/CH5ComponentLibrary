<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <script src="/webcomponentsjs/webcomponents-lite.js"></script>
  <script src="/bower_components/web-component-tester/browser.js"></script>
  <link rel="stylesheet" type="text/css" href="/wct_tests/themes/crestron-components-assets/base.css">

  <script src="/build_bundles/umd/cr-com-lib.js"></script>
</head>

<body>
  <test-fixture id="ch5-media-player-lifecycle">
    <template>
      <ch5-media-player></ch5-media-player>
    </template>
  </test-fixture>

  <test-fixture id="ch5-media-player-lifecycle-with-attributes">
    <template>
      <ch5-media-player 
        demomode="true"
        contractname="TestContract"
        usecontractforshow="true"
        usecontractforenable="true">
      </ch5-media-player>
    </template>
  </test-fixture>

  <script>
    suite('ch5-media-player-lifecycle-connected', () => {
      let ch5MediaPlayer;

      setup(async () => {
        ch5MediaPlayer = fixture('ch5-media-player-lifecycle');
      });

      test('Check component is connected to DOM', () => {
        expect(ch5MediaPlayer.isConnected).to.be.true;
      });

      test('Check WAI-ARIA role is set', () => {
        expect(ch5MediaPlayer.getAttribute('role')).to.be.equal('region');
      });

      test('Check primary CSS class is applied to container', (done) => {
        flush(() => {
          setTimeout(() => {
            const container = ch5MediaPlayer.querySelector('.ch5-media-player');
            expect(container).to.not.be.null;
            done();
          }, 100);
        });
      });

      test('Check component has internal HTML structure', (done) => {
        flush(() => {
          setTimeout(() => {
            const children = ch5MediaPlayer.querySelector('.ch5-media-player').children;
            expect(children.length).to.be.greaterThan(0);
            done();
          }, 100);
        });
      });
    });

    suite('ch5-media-player-lifecycle-disconnected', () => {
      let ch5MediaPlayer;
      let container;

      setup(async () => {
        container = document.createElement('div');
        document.body.appendChild(container);
        ch5MediaPlayer = document.createElement('ch5-media-player');
        container.appendChild(ch5MediaPlayer);
      });

      teardown(() => {
        if (container.parentNode) {
          container.parentNode.removeChild(container);
        }
      });

      test('Check component can be disconnected', (done) => {
        flush(() => {
          setTimeout(() => {
            container.removeChild(ch5MediaPlayer);
            expect(ch5MediaPlayer.isConnected).to.be.false;
            done();
          }, 100);
        });
      });

      test('Check component can be reconnected', (done) => {
        flush(() => {
          setTimeout(() => {
            container.removeChild(ch5MediaPlayer);
            container.appendChild(ch5MediaPlayer);
            expect(ch5MediaPlayer.isConnected).to.be.true;
            done();
          }, 100);
        });
      });
    });

    suite('ch5-media-player-attribute-initialization', () => {
      let ch5MediaPlayer;

      setup(async () => {
        ch5MediaPlayer = fixture('ch5-media-player-lifecycle-with-attributes');
      });

      test('Check demoMode is initialized from attribute', () => {
        expect(ch5MediaPlayer.demoMode).to.be.true;
      });

      test('Check contractName is initialized from attribute', () => {
        expect(ch5MediaPlayer.contractName).to.be.equal('TestContract');
      });

      test('Check useContractForShow is initialized from attribute', () => {
        expect(ch5MediaPlayer.useContractForShow).to.be.true;
      });

      test('Check useContractForEnable is initialized from attribute', () => {
        expect(ch5MediaPlayer.useContractForEnable).to.be.true;
      });
    });

    suite('ch5-media-player-observed-attributes', () => {
      let ch5MediaPlayer;

      setup(async () => {
        ch5MediaPlayer = fixture('ch5-media-player-lifecycle');
      });

      test('Check observedAttributes includes required attributes', () => {
        const observedAttrs = CrComLib.Ch5MediaPlayer.observedAttributes;
        expect(observedAttrs).to.include('demomode');
        expect(observedAttrs).to.include('contractname');
        expect(observedAttrs).to.include('receivestatecrpc');
        expect(observedAttrs).to.include('sendeventcrpc');
        expect(observedAttrs).to.include('receivestatemessage');
        expect(observedAttrs).to.include('receivestaterefreshmediaplayer');
        expect(observedAttrs).to.include('receivestatedeviceoffline');
        expect(observedAttrs).to.include('receivestateplayername');
      });

      test('Check attribute change triggers callback', (done) => {
        ch5MediaPlayer.setAttribute('demomode', 'true');
        flush(() => {
          setTimeout(() => {
            expect(ch5MediaPlayer.demoMode).to.be.true;
            done();
          }, 100);
        });
      });
    });

    suite('ch5-media-player-signal-attribute-types', () => {
      let signalTypes;

      setup(() => {
        signalTypes = CrComLib.Ch5MediaPlayer.SIGNAL_ATTRIBUTE_TYPES;
      });

      test('Check receivestatecrpc signal type', () => {
        expect(signalTypes.receivestatecrpc.direction).to.be.equal('state');
        expect(signalTypes.receivestatecrpc.stringJoin).to.be.equal(1);
        expect(signalTypes.receivestatecrpc.contractName).to.be.true;
      });

      test('Check sendeventcrpc signal type', () => {
        expect(signalTypes.sendeventcrpc.direction).to.be.equal('event');
        expect(signalTypes.sendeventcrpc.stringJoin).to.be.equal(1);
        expect(signalTypes.sendeventcrpc.contractName).to.be.true;
      });

      test('Check receivestatemessage signal type', () => {
        expect(signalTypes.receivestatemessage.direction).to.be.equal('state');
        expect(signalTypes.receivestatemessage.stringJoin).to.be.equal(1);
      });

      test('Check receivestaterefreshmediaplayer signal type', () => {
        expect(signalTypes.receivestaterefreshmediaplayer.direction).to.be.equal('state');
        expect(signalTypes.receivestaterefreshmediaplayer.booleanJoin).to.be.equal(1);
      });

      test('Check receivestatedeviceoffline signal type', () => {
        expect(signalTypes.receivestatedeviceoffline.direction).to.be.equal('state');
        expect(signalTypes.receivestatedeviceoffline.booleanJoin).to.be.equal(1);
      });

      test('Check receivestateplayername signal type', () => {
        expect(signalTypes.receivestateplayername.direction).to.be.equal('state');
        expect(signalTypes.receivestateplayername.stringJoin).to.be.equal(1);
      });
    });
  </script>
</body>

</html>
