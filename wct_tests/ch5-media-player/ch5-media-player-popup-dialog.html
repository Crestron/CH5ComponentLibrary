    suite('ch5-media-player-popup-basic-structure', () => {
      let ch5MediaPlayer;

      setup(async () => {
        // Reset progress bar state to avoid stale emissions from prior suites
        CrComLib.publishEvent('o', 'progressBarData', {});
        ch5MediaPlayer = fixture('ch5-media-player-popup');
      });

      test('Popup overlay appears when PopUpMessageData.show is true', (done) => {
        const popupData = {
          userInputRequired: "",
          text: "Test Message",
          textForItems: ["OK"],
          initialUserInput: "",
          timeoutSec: 10,
          show: true
        };
        CrComLib.publishEvent('o', 'PopUpMessageData', popupData);
        flush(() => {
          setTimeout(() => {
            const overlay = ch5MediaPlayer.querySelector('.ch5-media-player--popup-overlay');
            expect(overlay).to.not.be.null;
            done();
          }, 200);
        });
      });

      test('Popup title displays from PopUpMessageData.text', (done) => {
        const popupData = {
          userInputRequired: "",
          text: "Dialog Title Text",
          textForItems: ["OK"],
          initialUserInput: "",
          timeoutSec: 10,
          show: true
        };
        CrComLib.publishEvent('o', 'PopUpMessageData', popupData);
        flush(() => {
          setTimeout(() => {
            const title = ch5MediaPlayer.querySelector('.generic-dialog-title');
            expect(title).to.not.be.null;
            expect(title.textContent).to.include('Dialog Title Text');
            done();
          }, 200);
        });
      });

      test('Popup does not appear when PopUpMessageData.show is false', (done) => {
        const popupData = {
          userInputRequired: "",

            done();
          }, 200);

    suite('ch5-media-player-popup-timeout-behavior', () => {
      let ch5MediaPlayer;

      setup(async () => {
        CrComLib.publishEvent('o', 'progressBarData', {});
        ch5MediaPlayer = fixture('ch5-media-player-popup');
      });

      test('Popup auto-closes after timeout when timeoutSec > 0', (done) => {
        const popupData = {
          userInputRequired: "",
          text: "Auto Close",
          textForItems: ["OK"],
          initialUserInput: "",
          timeoutSec: 1,
          show: true
        };
        CrComLib.publishEvent('o', 'PopUpMessageData', popupData);
        flush(() => {
          setTimeout(() => {
            let overlay = ch5MediaPlayer.querySelector('.ch5-media-player--popup-overlay');
            expect(overlay).to.not.be.null;
            // Wait for timeout to trigger
            setTimeout(() => {
              overlay = ch5MediaPlayer.querySelector('.ch5-media-player--popup-overlay');
              expect(overlay).to.be.null;
              done();
            }, 1200);
          }, 200);
        });
      });

      test('Popup does not auto-close when timeoutSec is 0', (done) => {
        const popupData = {
          userInputRequired: "",
          text: "No Timeout",
          textForItems: ["OK"],
          initialUserInput: "",
          timeoutSec: 0,
          show: true
        };
        CrComLib.publishEvent('o', 'PopUpMessageData', popupData);
        flush(() => {
          setTimeout(() => {
            let overlay = ch5MediaPlayer.querySelector('.ch5-media-player--popup-overlay');
            expect(overlay).to.not.be.null;
            // Wait to confirm it does not close
            setTimeout(() => {
              overlay = ch5MediaPlayer.querySelector('.ch5-media-player--popup-overlay');
              expect(overlay).to.not.be.null;
              
              setTimeout(() => {
                overlay = ch5MediaPlayer.querySelector('.ch5-media-player--popup-overlay');
                expect(overlay).to.not.be.null;
                done();
              }, 5000);
            }, 800);
          }, 200);
        });
      });

      test('Large timeout value does not cause immediate close', (done) => {
        const popupData = {
          userInputRequired: "",
          text: "Large Timeout",
          textForItems: ["OK"],
          initialUserInput: "",
          timeoutSec: 999,
          show: true
        };
        CrComLib.publishEvent('o', 'PopUpMessageData', popupData);
        flush(() => {
          setTimeout(() => {
            const overlay = ch5MediaPlayer.querySelector('.ch5-media-player--popup-overlay');
            expect(overlay).to.not.be.null;
            done();
          }, 200);
        });
      });

      test('Popup auto-closes after 5 seconds when timeoutSec is 5', (done) => {
        const popupData = {
          userInputRequired: "",
          text: "Five Second Close",
          textForItems: ["OK"],
          initialUserInput: "",
          timeoutSec: 5,
          show: true
        };
        CrComLib.publishEvent('o', 'PopUpMessageData', popupData);
        flush(() => {
          setTimeout(() => {
            let overlay = ch5MediaPlayer.querySelector('.ch5-media-player--popup-overlay');
            expect(overlay).to.not.be.null;
            // Wait for timeout to trigger
            setTimeout(() => {
              overlay = ch5MediaPlayer.querySelector('.ch5-media-player--popup-overlay');
              expect(overlay).to.not.be.null;
              
              setTimeout(() => {
                overlay = ch5MediaPlayer.querySelector('.ch5-media-player--popup-overlay');
                expect(overlay).to.be.null;
                done();
              }, 3200);
            }, 2000);
          }, 200);
        });
      });

      test('Popup closes when clicking on overlay mask', (done) => {
        const popupData = {
          userInputRequired: "",
          text: "Click Overlay to Close",
          textForItems: ["OK"],
          initialUserInput: "",
          timeoutSec: 0,
          show: true
        };
        CrComLib.publishEvent('o', 'PopUpMessageData', popupData);
        flush(() => {
          setTimeout(() => {

            expect(overlay).to.not.be.null;
            
            overlay.click();
            flush(() => {

                expect(overlayAfterClick).to.be.null;
                done();

          timeoutSec: 10,
          show: true
        };
        CrComLib.publishEvent('o', 'PopUpMessageData', popupData);
        flush(() => {
          setTimeout(() => {
            const contentDiv = ch5MediaPlayer.querySelector('.dialog-content');
            expect(contentDiv).to.be.null;
            done();
          }, 200);
        });
      });
    });

    suite('ch5-media-player-loading-indicator', () => {
      let ch5MediaPlayer;

      setup(async () => {
        // Reset progress bar state to avoid stale emissions from prior suites
        CrComLib.publishEvent('o', 'progressBarData', {});
        ch5MediaPlayer = fixture('ch5-media-player-popup-live');
      });

      test('Check loading indicator exists', (done) => {
        flush(() => {
          setTimeout(() => {
            const loadingIndicator = ch5MediaPlayer.querySelector('.mp-loading-indicator');
            expect(loadingIndicator).to.not.be.null;
            done();
          }, 100);
        });
      });

      test('Check loading indicator shows when busy', (done) => {
        CrComLib.publishEvent('o', 'busyChanged', { on: true, timeoutSec: 30 });
        flush(() => {
          setTimeout(() => {
            const loadingIndicator = ch5MediaPlayer.querySelector('.mp-loading-indicator');
            expect(loadingIndicator.classList.contains('hide-loading-indicator')).to.be.false;
            done();
          }, 200);
        });
      });

      test('Check loading indicator hides when not busy', (done) => {
        CrComLib.publishEvent('o', 'busyChanged', { on: true, timeoutSec: 30 });
        flush(() => {
          setTimeout(() => {
            CrComLib.publishEvent('o', 'busyChanged', { on: false, timeoutSec: 0 });
            flush(() => {
              setTimeout(() => {
                const loadingIndicator = ch5MediaPlayer.querySelector('.mp-loading-indicator');
                expect(loadingIndicator.classList.contains('hide-loading-indicator')).to.be.true;
                done();
              }, 200);
            });
          }, 200);
        });
      });

      test('Check loading indicator auto-hides after timeout duration', (done) => {
        CrComLib.publishEvent('o', 'busyChanged', { on: true, timeoutSec: 2 });
        flush(() => {
          setTimeout(() => {
            let loadingIndicator = ch5MediaPlayer.querySelector('.mp-loading-indicator');
            expect(loadingIndicator.classList.contains('hide-loading-indicator')).to.be.false;
            // Wait for timeout duration to expire
            setTimeout(() => {
              loadingIndicator = ch5MediaPlayer.querySelector('.mp-loading-indicator');
              expect(loadingIndicator.classList.contains('hide-loading-indicator')).to.be.true;
              done();
            }, 2200);
          }, 200);
        });
      });
    });
  </script>
