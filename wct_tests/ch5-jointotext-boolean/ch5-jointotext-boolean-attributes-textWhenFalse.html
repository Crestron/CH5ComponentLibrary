<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <script src="/webcomponentsjs/webcomponents-lite.js"></script>
    <script src="/bower_components/web-component-tester/browser.js"></script>
    <link rel="stylesheet" type="text/css" href="/wct_tests/themes/crestron-components-assets/base.css">
    <script src="/wct_tests/js/helpers.js"></script>
    <script src="/build_bundles/umd/cr-com-lib.js"></script>
</head>

<body>

    <test-fixture id="ch5-jointotext-boolean-textWhenFalse-fixture">
        <template>
            <ch5-jointotext-boolean textWhenFalse="Paused" value="false"></ch5-jointotext-boolean>
        </template>
    </test-fixture>

    <test-fixture id="ch5-jointotext-boolean-textWhenFalse-empty-fixture">
        <template>
            <ch5-jointotext-boolean textWhenFalse="" value="false"></ch5-jointotext-boolean>
        </template>
    </test-fixture>

    <test-fixture id="ch5-jointotext-boolean-textWhenFalse-special-fixture">
        <template>
            <ch5-jointotext-boolean textWhenFalse="@#$%^&*()" value="false"></ch5-jointotext-boolean>
        </template>
    </test-fixture>

    <test-fixture id="ch5-jointotext-boolean-textWhenFalse-default-fixture">
        <template>
            <ch5-jointotext-boolean value="false"></ch5-jointotext-boolean>
        </template>
    </test-fixture>

    <script>
        suite('ch5-jointotext-boolean textWhenFalse set', () => {
            let ch5JoinToTextBoolean;

            setup(() => {
                ch5JoinToTextBoolean = fixture('ch5-jointotext-boolean-textWhenFalse-fixture');
                return Promise.all([customElements.whenDefined('ch5-jointotext-boolean')]);
            });

            test('textWhenFalse should be "Paused"', () => {
                expect(ch5JoinToTextBoolean.textWhenFalse).to.be.equal('Paused');
                expect(ch5JoinToTextBoolean.textContent).to.be.equal('Paused');
            });
        });

        suite('ch5-jointotext-boolean textWhenFalse empty', () => {
            let ch5JoinToTextBoolean;

            setup(() => {
                ch5JoinToTextBoolean = fixture('ch5-jointotext-boolean-textWhenFalse-empty-fixture');
                return Promise.all([customElements.whenDefined('ch5-jointotext-boolean')]);
            });

            test('textWhenFalse empty should display empty', () => {
                expect(ch5JoinToTextBoolean.textWhenFalse).to.be.equal('');
                expect(ch5JoinToTextBoolean.textContent).to.be.equal('');
            });
        });

        suite('ch5-jointotext-boolean textWhenFalse special characters', () => {
            let ch5JoinToTextBoolean;

            setup(() => {
                ch5JoinToTextBoolean = fixture('ch5-jointotext-boolean-textWhenFalse-special-fixture');
                return Promise.all([customElements.whenDefined('ch5-jointotext-boolean')]);
            });

            test('textWhenFalse with special characters', () => {
                expect(ch5JoinToTextBoolean.textWhenFalse).to.be.equal('@#$%^&*()');
                expect(ch5JoinToTextBoolean.textContent).to.be.equal('@#$%^&*()');
            });
        });

        suite('ch5-jointotext-boolean textWhenFalse default', () => {
            let ch5JoinToTextBoolean;

            setup(() => {
                ch5JoinToTextBoolean = fixture('ch5-jointotext-boolean-textWhenFalse-default-fixture');
                return Promise.all([customElements.whenDefined('ch5-jointotext-boolean')]);
            });

            test('textWhenFalse default should be empty', () => {
                expect(ch5JoinToTextBoolean.textWhenFalse).to.be.equal('');
            });
        });

        suite('ch5-jointotext-boolean textWhenFalse dynamic update', () => {
            let ch5JoinToTextBoolean;

            setup(() => {
                ch5JoinToTextBoolean = fixture('ch5-jointotext-boolean-textWhenFalse-default-fixture');
                return Promise.all([customElements.whenDefined('ch5-jointotext-boolean')]);
            });

            test('textWhenFalse can be set dynamically via attribute', (done) => {
                ch5JoinToTextBoolean.setAttribute('textWhenFalse', 'Dynamic False');
                flush(() => {
                    setTimeout(() => {
                        expect(ch5JoinToTextBoolean.textWhenFalse).to.be.equal('Dynamic False');
                        expect(ch5JoinToTextBoolean.textContent).to.be.equal('Dynamic False');
                        done();
                    }, 100);
                });
            });

            test('textWhenFalse can be set dynamically via property', (done) => {
                ch5JoinToTextBoolean.textWhenFalse = 'Property False';
                flush(() => {
                    setTimeout(() => {
                        expect(ch5JoinToTextBoolean.textWhenFalse).to.be.equal('Property False');
                        expect(ch5JoinToTextBoolean.textContent).to.be.equal('Property False');
                        done();
                    }, 100);
                });
            });
        });
    </script>
</body>

</html>
