<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <script src="/webcomponentsjs/webcomponents-lite.js"></script>
    <script src="/bower_components/web-component-tester/browser.js"></script>
    <link rel="stylesheet" type="text/css" href="/wct_tests/themes/crestron-components-assets/base.css">
    <script src="/wct_tests/js/helpers.js"></script>
    <script src="/build_bundles/umd/cr-com-lib.js"></script>
</head>

<body>
    <test-fixture id="ch5-jointotext-boolean-id-fixture">
        <template>
            <ch5-jointotext-boolean id="test-jointotext-boolean-id" textWhenFalse="Off"></ch5-jointotext-boolean>
        </template>
    </test-fixture>

    <test-fixture id="ch5-jointotext-boolean-id-empty-fixture">
        <template>
            <ch5-jointotext-boolean id="" textWhenFalse="Off"></ch5-jointotext-boolean>
        </template>
    </test-fixture>

    <test-fixture id="ch5-jointotext-boolean-no-id-fixture">
        <template>
            <ch5-jointotext-boolean textWhenFalse="Off"></ch5-jointotext-boolean>
        </template>
    </test-fixture>

    <test-fixture id="ch5-jointotext-boolean-id-special-chars-fixture">
        <template>
            <ch5-jointotext-boolean id="test-id-123_abc" textWhenFalse="Off"></ch5-jointotext-boolean>
        </template>
    </test-fixture>

    <script>
        suite('ch5-jointotext-boolean id attribute', () => {
            let ch5JoinToTextBoolean;

            setup(() => {
                ch5JoinToTextBoolean = fixture('ch5-jointotext-boolean-id-fixture');
                return Promise.all([customElements.whenDefined('ch5-jointotext-boolean')]);
            });

            test('id attribute should be set correctly', () => {
                expect(ch5JoinToTextBoolean.id).to.be.equal('test-jointotext-boolean-id');
                expect(ch5JoinToTextBoolean.getAttribute('id')).to.be.equal('test-jointotext-boolean-id');
            });
        });

        suite('ch5-jointotext-boolean id empty attribute', () => {
            let ch5JoinToTextBoolean;

            setup(() => {
                ch5JoinToTextBoolean = fixture('ch5-jointotext-boolean-id-empty-fixture');
                return Promise.all([customElements.whenDefined('ch5-jointotext-boolean')]);
            });

            test('id attribute should be empty string', () => {
                expect(ch5JoinToTextBoolean.id).to.be.equal('');
            });
        });

        suite('ch5-jointotext-boolean no id attribute', () => {
            let ch5JoinToTextBoolean;

            setup(() => {
                ch5JoinToTextBoolean = fixture('ch5-jointotext-boolean-no-id-fixture');
                return Promise.all([customElements.whenDefined('ch5-jointotext-boolean')]);
            });

            test('id attribute should be empty when not set', () => {
                expect(ch5JoinToTextBoolean.id).to.be.equal('');
            });
        });

        suite('ch5-jointotext-boolean id with special characters', () => {
            let ch5JoinToTextBoolean;

            setup(() => {
                ch5JoinToTextBoolean = fixture('ch5-jointotext-boolean-id-special-chars-fixture');
                return Promise.all([customElements.whenDefined('ch5-jointotext-boolean')]);
            });

            test('id attribute with special characters should be set correctly', () => {
                expect(ch5JoinToTextBoolean.id).to.be.equal('test-id-123_abc');
            });
        });

        suite('ch5-jointotext-boolean id dynamic update', () => {
            let ch5JoinToTextBoolean;

            setup(() => {
                ch5JoinToTextBoolean = fixture('ch5-jointotext-boolean-no-id-fixture');
                return Promise.all([customElements.whenDefined('ch5-jointotext-boolean')]);
            });

            test('id can be set dynamically via attribute', (done) => {
                ch5JoinToTextBoolean.setAttribute('id', 'dynamic-id');
                flush(() => {
                    setTimeout(() => {
                        expect(ch5JoinToTextBoolean.id).to.be.equal('dynamic-id');
                        expect(ch5JoinToTextBoolean.getAttribute('id')).to.be.equal('dynamic-id');
                        done();
                    }, 100);
                });
            });

            test('id can be set dynamically via property', (done) => {
                ch5JoinToTextBoolean.id = 'property-id';
                flush(() => {
                    setTimeout(() => {
                        expect(ch5JoinToTextBoolean.id).to.be.equal('property-id');
                        done();
                    }, 100);
                });
            });
        });
    </script>
</body>

</html>
