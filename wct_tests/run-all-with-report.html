<body>
	<div id="report-status">⏳ Running Tests...</div>
	<script>
const pagesToExecute = [
			'ch5-accessibility-attributes/index.html',
			'ch5-animation/index.html',
			'ch5-background/index.html',

		];


		executeTestCases(pagesToExecute);

		// Collect tests as they run
		const collectedTests = [];
		let currentSuiteName = '';
		
		function setupTestCapture() {
			if (!window.WCT || !window.WCT._reporter) {
				setTimeout(setupTestCapture, 500);
				return;
			}
			
			const reporter = window.WCT._reporter;
			const originalEmit = reporter.$events;
			
			// Listen for test events
			reporter.on('test end', function(test) {
				const testData = {
					suite: test.parent ? test.parent.fullTitle() : 'Unknown Suite',
					name: test.title,
					fullTitle: test.fullTitle(),
					status: test.state || (test.pending ? 'pending' : 'unknown'),
					duration: test.duration || 0,
					speed: test.speed || null,
					error: test.err ? {
						message: test.err.message || '',
						stack: test.err.stack || '',
						actual: test.err.actual,
						expected: test.err.expected,
						showDiff: test.err.showDiff || false
					} : null,
					body: test.body || (test.fn ? test.fn.toString() : ''),
					file: test.file || '',
					pending: test.pending || false,
					timedOut: test.timedOut || false
				};
				collectedTests.push(testData);
				console.log('📝 Captured test:', testData.name, '→', testData.status);
			});
			
			console.log('✅ Test capture listeners set up');
		}
		
		setupTestCapture();

		// Generate HTML report when tests complete
		function waitForTestCompletion() {
			const checkInterval = setInterval(function() {
				if (window.WCT && window.WCT._reporter && window.WCT._reporter.stats && window.WCT._reporter.stats.end) {
					clearInterval(checkInterval);
					const statusEl = document.getElementById('report-status');
					statusEl.textContent = '📊 Generating Report...';
					
					// Auto-generate and download the report
					setTimeout(function() {
						console.log('📊 Auto-generating report with', collectedTests.length, 'captured tests');
						generateHTMLReport(window.WCT._reporter.stats, collectedTests);
						statusEl.textContent = '✅ Report Downloaded!';
						statusEl.className = 'ready';
						
						// Allow manual re-download
						statusEl.onclick = function() {
							generateHTMLReport(window.WCT._reporter.stats, collectedTests);
						};
					}, 1000);
				}
			}, 1000);
		}

		setTimeout(waitForTestCompletion, 5000);

		function generateHTMLReport(stats, tests) {
			console.log('%cGenerating HTML Report...', 'color: #3b82f6; font-weight: bold;');
			console.log('  - tests array length:', tests.length);
			console.log('  - stats:', stats);
			
			const timestamp = new Date().toLocaleString();
			const status = stats.failures === 0 ? 'success' : 'failure';
			const duration = ((stats.end - stats.start) / 1000).toFixed(2);
			
			// Capture browser details
			const browserInfo = {
				userAgent: navigator.userAgent,
				platform: navigator.platform,
				cookieEnabled: navigator.cookieEnabled,
				onLine: navigator.onLine
			};
			
			// Helper function to escape HTML
			function escapeHtml(text) {
				if (!text) return '';
				return String(text)
					.replace(/&/g, '&amp;')
					.replace(/</g, '&lt;')
					.replace(/>/g, '&gt;')
					.replace(/"/g, '&quot;')
					.replace(/'/g, '&#039;');
			}
			
			// Use the tests array directly (already collected via event listener)
			const allTests = tests;
			console.log('%c🔢 TOTAL TESTS:', 'color: #dc2626; font-weight: bold; font-size: 18px;', allTests.length, 'tests');
			console.log('%c📋 All tests:', 'color: #3b82f6; font-weight: bold;', allTests);

			// Group by suite
			console.log('%c🔧 Starting to group tests...', 'color: #f59e0b; font-weight: bold;', 'allTests.length =', allTests.length);
			const suiteMap = {};
			allTests.forEach(test => {
				console.log('  Grouping test:', test.name, '→ suite:', test.suite);
				if (!test.suite) {
					console.warn('  ⚠️ Test has no suite name!', test);
				}
				if (!suiteMap[test.suite]) {
					suiteMap[test.suite] = { name: test.suite, tests: [], passed: 0, failed: 0, pending: 0 };
				}
				suiteMap[test.suite].tests.push(test);
				if (test.status === 'passed') suiteMap[test.suite].passed++;
				else if (test.status === 'failed') suiteMap[test.suite].failed++;
				else suiteMap[test.suite].pending++;
			});
			
			console.log('%c✅ Grouping complete!', 'color: #10b981; font-weight: bold;', 'Total suites:', Object.keys(suiteMap).length);
			console.log('%c📦 suiteMap:', 'color: #3b82f6; font-weight: bold;', suiteMap);

			const reportHTML = '<!DOCTYPE html>' +

'</html>';

			// Verify HTML contains tests
			console.log('%c🔍 HTML Report Stats:', 'color: #7c3aed; font-weight: bold; font-size: 16px;');
			
			// Show first 500 chars of report content section
			const contentStart = reportHTML.indexOf('<div class="content">');
			if (contentStart > 0) {
				console.log('  - Content section preview:', reportHTML.substring(contentStart, contentStart + 500));
			}

			// Download the report
			const now = new Date();
			const year = now.getFullYear();
			const month = String(now.getMonth() + 1).padStart(2, '0');
			const day = String(now.getDate()).padStart(2, '0');
			const hours = String(now.getHours()).padStart(2, '0');
			const minutes = String(now.getMinutes()).padStart(2, '0');
			const filename = `WCT-REPORT-${year}${month}${day}_${hours}${minutes}.html`;
			
			const blob = new Blob([reportHTML], {type: 'text/html'});
			const a = document.createElement('a');
			a.href = URL.createObjectURL(blob);
			a.download = filename;
			a.click();
			
			console.log('%c✅ HTML Report Downloaded!', 'color: green; font-size: 16px; font-weight: bold');
		}
	</script>
</body>
</html>
