<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <script src="/webcomponentsjs/webcomponents-lite.js"></script>
    <script src="/bower_components/web-component-tester/browser.js"></script>
    <link rel="stylesheet" type="text/css" href="/wct_tests/themes/crestron-components-assets/base.css">
    <script src="/wct_tests/js/helpers.js"></script>
    <script src="/build_bundles/umd/cr-com-lib.js"></script>
</head>

<body>
    <test-fixture id="ch5-jointotext-string-show-fixture">
        <template>
            <ch5-jointotext-string show="true" value="Test"></ch5-jointotext-string>
        </template>
    </test-fixture>

    <test-fixture id="ch5-jointotext-string-show-false-fixture">
        <template>
            <ch5-jointotext-string show="false" value="Test"></ch5-jointotext-string>
        </template>
    </test-fixture>

    <test-fixture id="ch5-jointotext-string-show-default-fixture">
        <template>
            <ch5-jointotext-string value="Test"></ch5-jointotext-string>
        </template>
    </test-fixture>

    <script>
        suite('ch5-jointotext-string-show-true', () => {
            let ch5JoinToTextString;

            setup(() => {
                ch5JoinToTextString = fixture('ch5-jointotext-string-show-fixture');
                return Promise.all([customElements.whenDefined('ch5-jointotext-string')]);
            });

            test('show attribute should be true', () => {
                expect(ch5JoinToTextString.getAttribute('show')).to.be.equal('true');
            });
        });

        suite('ch5-jointotext-string-show-false', () => {
            let ch5JoinToTextString;

            setup(() => {
                ch5JoinToTextString = fixture('ch5-jointotext-string-show-false-fixture');
                return Promise.all([customElements.whenDefined('ch5-jointotext-string')]);
            });

            test('show attribute should be false', () => {
                expect(ch5JoinToTextString.getAttribute('show')).to.be.equal('false');
            });
        });

        suite('ch5-jointotext-string-show-default', () => {
            let ch5JoinToTextString;

            setup(() => {
                ch5JoinToTextString = fixture('ch5-jointotext-string-show-default-fixture');
                return Promise.all([customElements.whenDefined('ch5-jointotext-string')]);
            });

            test('show attribute default should be true', () => {
                expect(ch5JoinToTextString.getAttribute('show')).to.be.null;
            });
        });

        suite('ch5-jointotext-string-show-dynamic', () => {
            let ch5JoinToTextString;

            setup(() => {
                ch5JoinToTextString = fixture('ch5-jointotext-string-show-default-fixture');
                return Promise.all([customElements.whenDefined('ch5-jointotext-string')]);
            });

            let testCases = ['a', '', ' ', '156', 'test', 'true', 'false'];
            let expectedResult = ['true', 'true', 'true', 'true', 'true', 'true', 'false'];
            testCases.forEach((ele, i) => {
                test(`Check Value "show" with input "${ele}"`, () => {
                    ch5JoinToTextString.setAttribute('show', ele);
                    expect(ch5JoinToTextString.getAttribute('show')).to.be.equal(expectedResult[i]);
                });
            });
        });
    </script>
</body>

</html>
