<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <script src="/webcomponentsjs/webcomponents-lite.js"></script>
    <script src="/bower_components/web-component-tester/browser.js"></script>
    <link rel="stylesheet" type="text/css" href="/wct_tests/themes/crestron-components-assets/base.css">
    <script src="/wct_tests/js/helpers.js"></script>
    <script src="/build_bundles/umd/cr-com-lib.js"></script>
</head>

<body>
    <test-fixture id="ch5-wifi-signal-level-gauge-id-fixture">
        <template>
            <ch5-wifi-signal-level-gauge id="test-wifi-gauge-id" value="50"></ch5-wifi-signal-level-gauge>
        </template>
    </test-fixture>

    <test-fixture id="ch5-wifi-signal-level-gauge-id-empty-fixture">
        <template>
            <ch5-wifi-signal-level-gauge id="" value="50"></ch5-wifi-signal-level-gauge>
        </template>
    </test-fixture>

    <test-fixture id="ch5-wifi-signal-level-gauge-no-id-fixture">
        <template>
            <ch5-wifi-signal-level-gauge value="50"></ch5-wifi-signal-level-gauge>
        </template>
    </test-fixture>

    <test-fixture id="ch5-wifi-signal-level-gauge-id-special-chars-fixture">
        <template>
            <ch5-wifi-signal-level-gauge id="test-id-123_abc" value="50"></ch5-wifi-signal-level-gauge>
        </template>
    </test-fixture>

    <script>
        suite('ch5-wifi-signal-level-gauge id attribute', () => {
            let ch5WifiSignalLevelGauge;

            setup(() => {
                ch5WifiSignalLevelGauge = fixture('ch5-wifi-signal-level-gauge-id-fixture');
                return Promise.all([customElements.whenDefined('ch5-wifi-signal-level-gauge')]);
            });

            test('id attribute should be set correctly', () => {
                expect(ch5WifiSignalLevelGauge.id).to.be.equal('test-wifi-gauge-id');
                expect(ch5WifiSignalLevelGauge.getAttribute('id')).to.be.equal('test-wifi-gauge-id');
            });
        });

        suite('ch5-wifi-signal-level-gauge id empty attribute', () => {
            let ch5WifiSignalLevelGauge;

            setup(() => {
                ch5WifiSignalLevelGauge = fixture('ch5-wifi-signal-level-gauge-id-empty-fixture');
                return Promise.all([customElements.whenDefined('ch5-wifi-signal-level-gauge')]);
            });

            test('id attribute should be empty string', () => {
                expect(ch5WifiSignalLevelGauge.id).to.be.equal('');
            });
        });

        suite('ch5-wifi-signal-level-gauge no id attribute', () => {
            let ch5WifiSignalLevelGauge;

            setup(() => {
                ch5WifiSignalLevelGauge = fixture('ch5-wifi-signal-level-gauge-no-id-fixture');
                return Promise.all([customElements.whenDefined('ch5-wifi-signal-level-gauge')]);
            });

            test('id attribute should be empty when not set', () => {
                expect(ch5WifiSignalLevelGauge.id).to.be.equal('');
            });
        });

        suite('ch5-wifi-signal-level-gauge id with special characters', () => {
            let ch5WifiSignalLevelGauge;

            setup(() => {
                ch5WifiSignalLevelGauge = fixture('ch5-wifi-signal-level-gauge-id-special-chars-fixture');
                return Promise.all([customElements.whenDefined('ch5-wifi-signal-level-gauge')]);
            });

            test('id attribute with special characters should be set correctly', () => {
                expect(ch5WifiSignalLevelGauge.id).to.be.equal('test-id-123_abc');
            });
        });

        suite('ch5-wifi-signal-level-gauge id dynamic update', () => {
            let ch5WifiSignalLevelGauge;

            setup(() => {
                ch5WifiSignalLevelGauge = fixture('ch5-wifi-signal-level-gauge-no-id-fixture');
                return Promise.all([customElements.whenDefined('ch5-wifi-signal-level-gauge')]);
            });

            test('id can be set dynamically via attribute', (done) => {
                ch5WifiSignalLevelGauge.setAttribute('id', 'dynamic-id');
                flush(() => {
                    setTimeout(() => {
                        expect(ch5WifiSignalLevelGauge.id).to.be.equal('dynamic-id');
                        expect(ch5WifiSignalLevelGauge.getAttribute('id')).to.be.equal('dynamic-id');
                        done();
                    }, 100);
                });
            });

            test('id can be set dynamically via property', (done) => {
                ch5WifiSignalLevelGauge.id = 'property-id';
                flush(() => {
                    setTimeout(() => {
                        expect(ch5WifiSignalLevelGauge.id).to.be.equal('property-id');
                        done();
                    }, 100);
                });
            });
        });
    </script>
</body>

</html>
