<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <script src="/webcomponentsjs/webcomponents-lite.js"></script>
  <script src="/bower_components/web-component-tester/browser.js"></script>
  <link rel="stylesheet" type="text/css" href="/wct_tests/themes/crestron-components-assets/base.css">
  <script src="/wct_tests/js/helpers.js"></script>
  <script src="/build_bundles/umd/cr-com-lib.js"></script>
</head>

<body>

  <!-- Basic slider with sendEventOnHandleClick -->
  <test-fixture id="ch5-slider-handleclick-basic">
    <template>
      <ch5-slider sendEventOnHandleClick="handle_click_basic"></ch5-slider>
    </template>
  </test-fixture>

  <!-- Slider disabled: signals should NOT fire -->
  <test-fixture id="ch5-slider-handleclick-disabled">
    <template>
      <ch5-slider sendEventOnHandleClick="handle_click_disabled" disabled="true"></ch5-slider>
    </template>
  </test-fixture>

  <!-- Slider without sendEventOnHandleClick attribute: no crash, no signals -->
  <test-fixture id="ch5-slider-handleclick-no-attr">
    <template>
      <ch5-slider></ch5-slider>
    </template>
  </test-fixture>

  <!-- Range slider: sendEventOnHandleClick still fires on both handles -->
  <test-fixture id="ch5-slider-handleclick-range">
    <template>
      <ch5-slider sendEventOnHandleClick="handle_click_range" range="true"></ch5-slider>
    </template>
  </test-fixture>

  <!-- sendEventOnHandleClick alongside sendEventOnChange: analog signals appear between boolean signals -->
  <test-fixture id="ch5-slider-handleclick-with-change">
    <template>
      <ch5-slider
        sendEventOnHandleClick="handle_click_combo"
        sendEventOnChange="handle_change_combo">
      </ch5-slider>
    </template>
  </test-fixture>

  <script>
    // CH5C-28859
    // These tests verify that sendEventOnHandleClick publishes:
    //   true  → immediately when the slider handle drag STARTS (_onSliderStart)
    //   false → immediately when the slider handle drag STOPS  (_onSliderStop)
    // Previously both were published together on click, causing incorrect signal ordering
    // relative to the analog value updates emitted during the drag.

    const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    // Subscribe to a boolean signal and collect emitted values.
    // Skips the initial subscription emission (signal initialisation).
    function subscribeBooleanSignal(signalName) {
      const csf = CrComLib.Ch5SignalFactory.getInstance();
      const signal = csf.getBooleanSignal(signalName);
      const values = [];
      let skipInitial = true;
      const subscriptionId = signal.subscribe((value) => {
        if (skipInitial) { skipInitial = false; return; }
        values.push(value);
      });
      return { values, unsubscribe: () => signal.unsubscribe(subscriptionId) };
    }

    // Subscribe to a number signal and collect emitted values.
    // Skips the initial subscription emission.
    function subscribeNumberSignal(signalName) {
      const csf = CrComLib.Ch5SignalFactory.getInstance();
      const signal = csf.getNumberSignal(signalName);
      const values = [];
      let skipInitial = true;
      const subscriptionId = signal.subscribe((value) => {
        if (skipInitial) { skipInitial = false; return; }
        values.push(value);
      });
      return { values, unsubscribe: () => signal.unsubscribe(subscriptionId) };
    }

    // Wait for the slider to render, then return the noUi handle element.
    async function getHandle(slider) {
      await wait(120);
      return slider.querySelector('.noUi-handle');
    }

    // Simulate a full drag lifecycle: mousedown on handle → mousemove → mouseup.
    // noUiSlider fires 'start' on mousedown and 'end' on mouseup, which is exactly
    // what _onSliderStart / _onSliderStop are hooked on to.
    function simulateDrag(handle) {
      const rect = handle.getBoundingClientRect();
      const x = rect.left + rect.width / 2;
      const y = rect.top + rect.height / 2;

      handle.dispatchEvent(new MouseEvent('mousedown', {
        bubbles: true, cancelable: true, button: 0, buttons: 1, clientX: x, clientY: y
      }));
      document.dispatchEvent(new MouseEvent('mousemove', {
        bubbles: true, cancelable: true, buttons: 1, clientX: x + 2, clientY: y
      }));
      document.dispatchEvent(new MouseEvent('mouseup', {
        bubbles: true, cancelable: true, button: 0, clientX: x + 2, clientY: y
      }));
    }

    suite('ch5-slider sendEventOnHandleClick – CH5C-28859', () => {

      // --------------------------------------------------------------
      // Core ordering test: true must come BEFORE false
      // --------------------------------------------------------------
      test('sendEventOnHandleClick: true is published before false', async () => {
        const slider = fixture('ch5-slider-handleclick-basic');
        await customElements.whenDefined('ch5-slider');
        const handle = await getHandle(slider);
        expect(handle, 'noUi-handle must exist').to.not.equal(null);

        const observer = subscribeBooleanSignal('handle_click_basic');

        // Drive the lifecycle via the internal callbacks directly, which is the
        // most reliable cross-browser way to test signal order without relying on
        // browser coordinate precision for noUiSlider's internal pointer capture.
        slider._onSliderStart([slider.value], 0);
        await wait(10);
        slider._onSliderStop([slider.value], 0);
        await wait(30);

        observer.unsubscribe();
        expect(observer.values, 'should have received exactly [true, false]')
          .to.deep.equal([true, false]);
      });

      // --------------------------------------------------------------
      // true fires on drag start (before any drag move)
      // --------------------------------------------------------------
      test('sendEventOnHandleClick: true is published on drag start', async () => {
        const slider = fixture('ch5-slider-handleclick-basic');
        await customElements.whenDefined('ch5-slider');
        await getHandle(slider);

        const observer = subscribeBooleanSignal('handle_click_basic');

        slider._onSliderStart([slider.value], 0);
        await wait(30);

        // Only true should have been emitted so far — false comes on stop
        observer.unsubscribe();
        expect(observer.values[0]).to.equal(true);
        expect(observer.values.length).to.equal(1);
      });

      // --------------------------------------------------------------
      // false fires on drag stop (after all drag moves)
      // --------------------------------------------------------------
      test('sendEventOnHandleClick: false is published on drag stop', async () => {
        const slider = fixture('ch5-slider-handleclick-basic');
        await customElements.whenDefined('ch5-slider');
        await getHandle(slider);

        const observer = subscribeBooleanSignal('handle_click_basic');

        slider._onSliderStart([slider.value], 0);
        await wait(10);
        slider._onSliderStop([slider.value], 0);
        await wait(30);

        observer.unsubscribe();
        const lastValue = observer.values[observer.values.length - 1];
        expect(lastValue).to.equal(false);
      });

      // --------------------------------------------------------------
      // Disabled slider must NOT publish any signal
      // --------------------------------------------------------------
      test('disabled slider: sendEventOnHandleClick does not publish', async () => {
        const slider = fixture('ch5-slider-handleclick-disabled');
        await customElements.whenDefined('ch5-slider');
        await getHandle(slider);

        const observer = subscribeBooleanSignal('handle_click_disabled');

        // Simulate the lifecycle even though disabled
        slider._onSliderStart([slider.value], 0);
        await wait(10);
        slider._onSliderStop([slider.value], 0);
        await wait(30);

        observer.unsubscribe();
        expect(observer.values, 'disabled slider should emit no signals')
          .to.deep.equal([]);
      });

      // --------------------------------------------------------------
      // No attribute set: callbacks run without throwing
      // --------------------------------------------------------------
      test('slider without sendEventOnHandleClick: no error on drag lifecycle', async () => {
        const slider = fixture('ch5-slider-handleclick-no-attr');
        await customElements.whenDefined('ch5-slider');
        await getHandle(slider);

        // Should not throw
        let threw = false;
        try {
          slider._onSliderStart([slider.value], 0);
          await wait(10);
          slider._onSliderStop([slider.value], 0);
          await wait(20);
        } catch (e) {
          threw = true;
        }
        expect(threw).to.equal(false);
      });

      // --------------------------------------------------------------
      // Range slider: signals fire for each handle independently
      // --------------------------------------------------------------
      test('range slider: sendEventOnHandleClick publishes [true, false] for low handle (0)', async () => {
        const slider = fixture('ch5-slider-handleclick-range');
        await customElements.whenDefined('ch5-slider');
        await getHandle(slider);

        const observer = subscribeBooleanSignal('handle_click_range');

        slider._onSliderStart([slider.value, slider.valueHigh], 0);
        await wait(10);
        slider._onSliderStop([slider.value, slider.valueHigh], 0);
        await wait(30);

        observer.unsubscribe();
        expect(observer.values).to.deep.equal([true, false]);
      });

      test('range slider: sendEventOnHandleClick publishes [true, false] for high handle (1)', async () => {
        const slider = fixture('ch5-slider-handleclick-range');
        await customElements.whenDefined('ch5-slider');
        await getHandle(slider);

        const observer = subscribeBooleanSignal('handle_click_range');

        slider._onSliderStart([slider.value, slider.valueHigh], 1);
        await wait(10);
        slider._onSliderStop([slider.value, slider.valueHigh], 1);
        await wait(30);

        observer.unsubscribe();
        expect(observer.values).to.deep.equal([true, false]);
      });

      // --------------------------------------------------------------
      // Core bug regression: boolean true must precede analogs,
      // boolean false must follow all analogs.
      //
      // This directly validates the expected log order from CH5C-28859:
      //   boolean true → integers... → boolean false
      // --------------------------------------------------------------
      test('signal ordering: boolean true → analog values → boolean false (regression CH5C-28859)', async () => {
        const slider = fixture('ch5-slider-handleclick-with-change');
        await customElements.whenDefined('ch5-slider');
        await getHandle(slider);

        // Track ALL signal emissions in arrival order using a combined log.
        const log = [];

        const csf = CrComLib.Ch5SignalFactory.getInstance();

        const boolSignal = csf.getBooleanSignal('handle_click_combo');
        let skipBool = true;
        const boolSubId = boolSignal.subscribe(v => {
          if (skipBool) { skipBool = false; return; }
          log.push({ type: 'boolean', value: v });
        });

        const numSignal = csf.getNumberSignal('handle_change_combo');
        let skipNum = true;
        const numSubId = numSignal.subscribe(v => {
          if (skipNum) { skipNum = false; return; }
          log.push({ type: 'integer', value: v });
        });

        // 1. Drag start → should emit boolean true
        slider._onSliderStart([slider.value], 0);
        await wait(10);

        // 2. Simulate value changes mid-drag via _onSliderChange (analog signals)
        slider._onSliderChange([100], 0);
        await wait(10);
        slider._onSliderChange([200], 0);
        await wait(10);
        slider._onSliderChange([300], 0);
        await wait(10);

        // 3. Drag stop → should emit boolean false
        slider._onSliderStop([300], 0);
        await wait(30);

        boolSignal.unsubscribe(boolSubId);
        numSignal.unsubscribe(numSubId);

        // Verify there is at least one entry of each type
        expect(log.length, 'log must not be empty').to.be.greaterThan(0);

        const firstEntry = log[0];
        const lastEntry = log[log.length - 1];

        // First signal must be boolean true
        expect(firstEntry.type, 'first signal must be boolean').to.equal('boolean');
        expect(firstEntry.value, 'first signal must be true').to.equal(true);

        // Last signal must be boolean false
        expect(lastEntry.type, 'last signal must be boolean').to.equal('boolean');
        expect(lastEntry.value, 'last signal must be false').to.equal(false);

        // All entries between first and last must be integer (analog)
        const middle = log.slice(1, log.length - 1);
        middle.forEach((entry, idx) => {
          expect(entry.type, `entry[${idx + 1}] must be integer`).to.equal('integer');
        });
      });

      // --------------------------------------------------------------
      // Multiple drag cycles: each produces exactly one true and one false
      // --------------------------------------------------------------
      test('multiple drag cycles: each cycle emits exactly [true, false]', async () => {
        const slider = fixture('ch5-slider-handleclick-basic');
        await customElements.whenDefined('ch5-slider');
        await getHandle(slider);

        const observer = subscribeBooleanSignal('handle_click_basic');

        // Cycle 1
        slider._onSliderStart([slider.value], 0);
        await wait(10);
        slider._onSliderStop([slider.value], 0);
        await wait(20);

        // Cycle 2
        slider._onSliderStart([slider.value], 0);
        await wait(10);
        slider._onSliderStop([slider.value], 0);
        await wait(20);

        // Cycle 3
        slider._onSliderStart([slider.value], 0);
        await wait(10);
        slider._onSliderStop([slider.value], 0);
        await wait(30);

        observer.unsubscribe();
        expect(observer.values).to.deep.equal([true, false, true, false, true, false]);
      });

    });
  </script>
</body>

</html>
