<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <script src="/webcomponentsjs/webcomponents-lite.js"></script>
  <script src="/bower_components/web-component-tester/browser.js"></script>
  <link rel="stylesheet" type="text/css" href="/wct_tests/themes/crestron-components-assets/base.css">
  <script src="/wct_tests/js/helpers.js"></script>
  <script src="/build_bundles/umd/cr-com-lib.js"></script>
</head>

<body>
  <test-fixture id="ch5-slider-sendEventOnClick-regular">
    <template>
      <ch5-slider sendEventOnClick="slider_click_event"></ch5-slider>
    </template>
  </test-fixture>

  <test-fixture id="ch5-slider-sendEventOnClick-nohandle">
    <template>
      <ch5-slider sendEventOnClick="slider_click_event_nohandle" noHandle="true" tapSettable="true"></ch5-slider>
    </template>
  </test-fixture>

  <test-fixture id="ch5-slider-sendEventOnClick-with-handleclick">
    <template>
      <ch5-slider
        sendEventOnClick="slider_click_event_combo_handle"
        sendEventOnHandleClick="slider_handle_click_event_combo">
      </ch5-slider>
    </template>
  </test-fixture>

  <test-fixture id="ch5-slider-sendEventOnClick-with-upper-lower">
    <template>
      <ch5-slider
        sendEventOnClick="slider_click_event_combo_advanced"
        sendEventOnLower="slider_lower_event_combo"
        sendEventOnUpper="slider_upper_event_combo"
        orientation="horizontal"
        size="large">
        <ch5-slider-title-label label="Advanced Slider"></ch5-slider-title-label>
        <ch5-slider-button key="on" label="on"></ch5-slider-button>
        <ch5-slider-button key="off" label="off"></ch5-slider-button>
      </ch5-slider>
    </template>
  </test-fixture>

  <test-fixture id="ch5-slider-sendEventOnClick-with-change-signals">
    <template>
      <ch5-slider
        range="true"
        sendEventOnClick="slider_click_event_combo_range"
        sendEventOnChange="slider_change_event_combo"
        sendEventOnChangeHigh="slider_change_high_event_combo"
        orientation="vertical"
        toolTipShowType="on"
        tapSettable="true">
      </ch5-slider>
    </template>
  </test-fixture>

  <script>
    // Utility: wait helper to simplify async timing around rendered slider/events.
    const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    // Dispatch pointer interactions used by slider press/release behavior.
    function dispatchPointer(target, type) {
      let event;
      try {
        event = new PointerEvent(type, {
          bubbles: true,
          cancelable: true,
          pointerId: 1,
          pointerType: 'mouse',
          isPrimary: true,
          buttons: type === 'pointerdown' ? 1 : 0
        });
      } catch (e) {
        event = new MouseEvent(type === 'pointerdown' ? 'mousedown' : 'mouseup', {
          bubbles: true,
          cancelable: true,
          buttons: type === 'pointerdown' ? 1 : 0
        });
      }
      target.dispatchEvent(event);
    }

    // Dispatch mouse events for noUiSlider handle start/end path.
    function dispatchMouse(target, type, init = {}) {
      const event = new MouseEvent(type, {
        bubbles: true,
        cancelable: true,
        buttons: type === 'mousedown' ? 1 : 0,
        ...init
      });
      target.dispatchEvent(event);
    }

    // Trigger mouse down/up on a horizontal track zone using a ratio from 0.0 (left) to 1.0 (right).
    function dispatchTrackZoneMouse(track, ratio) {
      const rect = track.getBoundingClientRect();
      const clientX = rect.left + (rect.width * ratio);
      const clientY = rect.top + (rect.height / 2);
      dispatchMouse(track, 'mousedown', { clientX, clientY });
      dispatchMouse(track, 'mouseup', { clientX, clientY });
    }

    // Trigger handle interaction with coordinates and tiny move so noUiSlider emits start/end reliably.
    function dispatchHandleMouseSequence(handle) {
      const rect = handle.getBoundingClientRect();
      const startX = rect.left + (rect.width / 2);
      const startY = rect.top + (rect.height / 2);
      dispatchMouse(handle, 'mousedown', { clientX: startX, clientY: startY, button: 0 });
      dispatchMouse(document, 'mousemove', { clientX: startX + 1, clientY: startY, buttons: 1, button: 0 });
      dispatchMouse(document, 'mouseup', { clientX: startX + 1, clientY: startY, button: 0 });
    }

    // Collect emitted number signal values for a given signal name.
    function subscribeNumberSignalValues(signalName) {
      const signalFactory = CrComLib.Ch5SignalFactory.getInstance();
      const signal = signalFactory.getNumberSignal(signalName);
      const values = [];
      let skipInitial = true;
      const subscriptionId = signal.subscribe((value) => {
        if (skipInitial) {
          skipInitial = false;
          return;
        }
        values.push(value);
      });
      return {
        values,
        unsubscribe: () => signal.unsubscribe(subscriptionId)
      };
    }

    // Collect emitted boolean signal values for a given signal name.
    // First emission is initial signal state, so skip it and capture only interaction outputs.
    function subscribeSignalValues(signalName) {
      const signalFactory = CrComLib.Ch5SignalFactory.getInstance();
      const signal = signalFactory.getBooleanSignal(signalName);
      const values = [];
      let skipInitial = true;
      const subscriptionId = signal.subscribe((value) => {
        if (skipInitial) {
          skipInitial = false;
          return;
        }
        values.push(value);
      });
      return {
        values,
        unsubscribe: () => signal.unsubscribe(subscriptionId)
      };
    }

    // Access internal slider UI parts after render to interact with track/handle.
    async function getSliderParts(slider) {
      await wait(120);
      const track = slider.querySelector('.noUi-base') || slider.querySelector('.noUi-target');
      const handle = slider.querySelector('.noUi-handle');
      return { track, handle };
    }

    suite('ch5-slider-sendEventOnClick', () => {
      // Verifies single track click publishes one high on press and one low on release.
      test('regular slider quick track click publishes exactly [true, false]', async () => {
        const slider = fixture('ch5-slider-sendEventOnClick-regular');
        await customElements.whenDefined('ch5-slider');

        const { track } = await getSliderParts(slider);
        expect(track).to.not.equal(null);

        const signalObserver = subscribeSignalValues('slider_click_event');
        dispatchPointer(track, 'pointerdown');
        await wait(50);
        dispatchPointer(document, 'pointerup');
        await wait(80);

        signalObserver.unsubscribe();
        expect(signalObserver.values).to.deep.equal([true, false]);
      });

      // Verifies press-and-hold on track repeats high values and ends with low on release.
      test('regular slider hold on track repeats true and ends with false', async () => {
        const slider = fixture('ch5-slider-sendEventOnClick-regular');
        await customElements.whenDefined('ch5-slider');

        const { track } = await getSliderParts(slider);
        expect(track).to.not.equal(null);

        const signalObserver = subscribeSignalValues('slider_click_event');
        dispatchPointer(track, 'pointerdown');
        await wait(950);
        dispatchPointer(document, 'pointerup');
        await wait(80);

        signalObserver.unsubscribe();
        const values = signalObserver.values;
        const trueCount = values.filter(v => v === true).length;
        expect(values[0]).to.equal(true);
        expect(values[values.length - 1]).to.equal(false);
        expect(trueCount).to.be.greaterThan(1);
      });

      // Verifies noHandle mode still supports track press/release sendEventOnClick behavior.
      test('noHandle slider track click publishes exactly [true, false]', async () => {
        const slider = fixture('ch5-slider-sendEventOnClick-nohandle');
        await customElements.whenDefined('ch5-slider');

        const { track } = await getSliderParts(slider);
        expect(track).to.not.equal(null);

        const signalObserver = subscribeSignalValues('slider_click_event_nohandle');
        dispatchPointer(track, 'pointerdown');
        await wait(50);
        dispatchPointer(document, 'pointerup');
        await wait(80);

        signalObserver.unsubscribe();
        expect(signalObserver.values).to.deep.equal([true, false]);
      });

      // Verifies sendEventOnClick and sendEventOnHandleClick both publish when handle is clicked.
      test('combination: sendEventOnClick + sendEventOnHandleClick on handle click', async () => {
        const slider = fixture('ch5-slider-sendEventOnClick-with-handleclick');
        await customElements.whenDefined('ch5-slider');

        const { handle } = await getSliderParts(slider);
        expect(handle).to.not.equal(null);

        const clickObserver = subscribeSignalValues('slider_click_event_combo_handle');
        const handleClickObserver = subscribeSignalValues('slider_handle_click_event_combo');

        // Deterministic handle path for sendEventOnClick (noUiSlider start/end callbacks).
        expect(typeof slider._onSliderStart).to.equal('function');
        expect(typeof slider._onSliderStop).to.equal('function');
        slider._onSliderStart([slider.value], 0);
        await wait(20);
        slider._onSliderStop([slider.value], 0);

        // Real DOM click for sendEventOnHandleClick.
        dispatchMouse(handle, 'click');
        await wait(120);

        clickObserver.unsubscribe();
        handleClickObserver.unsubscribe();
        expect(clickObserver.values).to.deep.equal([true, false]);
        expect(handleClickObserver.values).to.deep.equal([true, false]);
      });

      // Verifies sendEventOnLower is emitted on lower-zone interaction while sendEventOnClick still works.
      test('combination: sendEventOnClick + sendEventOnLower', async () => {
        const slider = fixture('ch5-slider-sendEventOnClick-with-upper-lower');
        await customElements.whenDefined('ch5-slider');

        const { track } = await getSliderParts(slider);
        expect(track).to.not.equal(null);

        const clickObserver = subscribeSignalValues('slider_click_event_combo_advanced');
        const lowerObserver = subscribeSignalValues('slider_lower_event_combo');
        const upperObserver = subscribeSignalValues('slider_upper_event_combo');

        // sendEventOnClick path
        dispatchPointer(track, 'pointerdown');
        await wait(30);
        dispatchPointer(document, 'pointerup');

        // sendEventOnLower path (left/lower zone)
        dispatchTrackZoneMouse(track, 0.1);
        await wait(120);

        clickObserver.unsubscribe();
        lowerObserver.unsubscribe();
        upperObserver.unsubscribe();

        expect(clickObserver.values).to.deep.equal([true, false]);
        expect(lowerObserver.values).to.deep.equal([true, false]);
        expect(upperObserver.values).to.deep.equal([]);
      });

      // Verifies sendEventOnUpper is emitted on upper-zone interaction while sendEventOnClick still works.
      test('combination: sendEventOnClick + sendEventOnUpper', async () => {
        const slider = fixture('ch5-slider-sendEventOnClick-with-upper-lower');
        await customElements.whenDefined('ch5-slider');

        const { track } = await getSliderParts(slider);
        expect(track).to.not.equal(null);

        const clickObserver = subscribeSignalValues('slider_click_event_combo_advanced');
        const lowerObserver = subscribeSignalValues('slider_lower_event_combo');
        const upperObserver = subscribeSignalValues('slider_upper_event_combo');

        // sendEventOnClick path
        dispatchPointer(track, 'pointerdown');
        await wait(30);
        dispatchPointer(document, 'pointerup');

        // sendEventOnUpper path (right/upper zone)
        dispatchTrackZoneMouse(track, 0.9);
        await wait(120);

        clickObserver.unsubscribe();
        lowerObserver.unsubscribe();
        upperObserver.unsubscribe();

        expect(clickObserver.values).to.deep.equal([true, false]);
        expect(upperObserver.values).to.deep.equal([true, false]);
        expect(lowerObserver.values).to.deep.equal([]);
      });

      // Verifies signal objects are available when sendEventOnClick is combined with range/change/changeHigh and extra attributes.
      test('combination: sendEventOnClick + sendEventOnChange + sendEventOnChangeHigh with range/vertical/tooltip/tapSettable', async () => {
        const slider = fixture('ch5-slider-sendEventOnClick-with-change-signals');
        await customElements.whenDefined('ch5-slider');

        const { track } = await getSliderParts(slider);
        expect(track).to.not.equal(null);

        const signalFactory = CrComLib.Ch5SignalFactory.getInstance();
        const clickSignal = signalFactory.getBooleanSignal('slider_click_event_combo_range', false);
        const changeSignal = signalFactory.getNumberSignal('slider_change_event_combo', false);
        const changeHighSignal = signalFactory.getNumberSignal('slider_change_high_event_combo', false);

        expect(clickSignal).to.not.equal(null);
        expect(changeSignal).to.not.equal(null);
        expect(changeHighSignal).to.not.equal(null);

        const clickObserver = subscribeSignalValues('slider_click_event_combo_range');
        const changeObserver = subscribeNumberSignalValues('slider_change_event_combo');
        const changeHighObserver = subscribeNumberSignalValues('slider_change_high_event_combo');

        dispatchPointer(track, 'pointerdown');
        await wait(30);
        dispatchPointer(document, 'pointerup');
        await wait(120);

        clickObserver.unsubscribe();
        changeObserver.unsubscribe();
        changeHighObserver.unsubscribe();

        expect(clickObserver.values).to.deep.equal([true, false]);
      });
    });
  </script>
</body>

</html>
