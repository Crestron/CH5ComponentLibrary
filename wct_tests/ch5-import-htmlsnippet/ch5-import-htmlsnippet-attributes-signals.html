    <script>
        suite('ch5-import-htmlsnippet receiveStateShow tests', function() {
            let ch5ImportHtmlsnippet;
            let emulator;

            setup(async function() {
                const emulatorJson = await fetch('./emulator/receivestateshow.json').then((response) => response.json());
                emulator = CrComLib.Ch5Emulator.getInstance();
                emulator.loadScenario(emulatorJson);
                ch5ImportHtmlsnippet = fixture('ch5-import-htmlsnippet-receivestateshow-fixture');
            });

            test('receivestateshow attribute is set correctly', function() {
                assert.equal(ch5ImportHtmlsnippet.getAttribute('receivestateshow'), 'signal_show');
            });

            test('receiveStateShow signal=true updates show attribute to true', function(done) {
                CrComLib.publishEvent('b', 'set_show_true', true);
                flush(function() {
                    setTimeout(function() {
                        assert.equal(ch5ImportHtmlsnippet.getAttribute('show'), 'true', 'show attribute should be true');
                        assert.equal(ch5ImportHtmlsnippet.show, true, 'show property should be true');
                        done();
                    }, 100);
                });
            });

            test('receiveStateShow signal=true makes element visible (no hide classes)', function(done) {
                CrComLib.publishEvent('b', 'set_show_true', true);
                flush(function() {
                    setTimeout(function() {
                        assert.isFalse(ch5ImportHtmlsnippet.classList.contains('ch5-hide-dis'), 'Should not have ch5-hide-dis class');
                        assert.isFalse(ch5ImportHtmlsnippet.classList.contains('ch5-hide-vis'), 'Should not have ch5-hide-vis class');
                        done();
                    }, 100);
                });
            });

            test('receiveStateShow signal=false updates show attribute to false', function(done) {
                CrComLib.publishEvent('b', 'set_show_false', true);
                flush(function() {
                    setTimeout(function() {
                        assert.equal(ch5ImportHtmlsnippet.getAttribute('show'), 'false', 'show attribute should be false');
                        assert.equal(ch5ImportHtmlsnippet.show, false, 'show property should be false');
                        // Default noshowtype is display; element should have ch5-hide-dis and not ch5-hide-vis
                        assert.isTrue(ch5ImportHtmlsnippet.classList.contains('ch5-hide-dis'), 'Should have ch5-hide-dis class by default');
                        assert.isFalse(ch5ImportHtmlsnippet.classList.contains('ch5-hide-vis'), 'Should not have ch5-hide-vis class by default');
                        done();
                    }, 100);
                });
            });

            test('receiveStateShow signal=false hides element with default noshowtype (display)', function(done) {
                CrComLib.publishEvent('b', 'set_show_false', true);
                flush(function() {
                    setTimeout(function() {
                        assert.isTrue(ch5ImportHtmlsnippet.classList.contains('ch5-hide-dis'), 'Should have ch5-hide-dis class');
                        assert.isFalse(ch5ImportHtmlsnippet.classList.contains('ch5-hide-vis'), 'Should not have ch5-hide-vis class');
                        done();
                    }, 100);
                });
            });

            test('receiveStateShow toggles show attribute and classes multiple times', function(done) {
                // Hide
                CrComLib.publishEvent('b', 'set_show_false', true);
                flush(function() {
                    setTimeout(function() {
                        assert.equal(ch5ImportHtmlsnippet.getAttribute('show'), 'false');
                        assert.isTrue(ch5ImportHtmlsnippet.classList.contains('ch5-hide-dis'));
                        
                        // Show
                        CrComLib.publishEvent('b', 'set_show_true', true);
                        flush(function() {
                            setTimeout(function() {
                                assert.equal(ch5ImportHtmlsnippet.getAttribute('show'), 'true');
                                assert.isFalse(ch5ImportHtmlsnippet.classList.contains('ch5-hide-dis'));
                                done();
                            }, 100);
                        });
                    }, 100);
                });
            });
        });

        suite('ch5-import-htmlsnippet receiveStateShow with noshowtype tests', function() {
            let ch5ImportHtmlsnippet;
            let emulator;

            setup(async function() {
                const emulatorJson = await fetch('./emulator/receivestateshow.json').then((response) => response.json());
                emulator = CrComLib.Ch5Emulator.getInstance();
                emulator.loadScenario(emulatorJson);
                ch5ImportHtmlsnippet = fixture('ch5-import-htmlsnippet-receivestateshow-fixture');
            });

            const noshowTypes = [
                { value: 'display', hideClass: 'ch5-hide-dis', otherClass: 'ch5-hide-vis' },
                { value: 'visibility', hideClass: 'ch5-hide-vis', otherClass: 'ch5-hide-dis' },
                { value: 'remove', hideClass: null, otherClass: null }
            ];

            noshowTypes.forEach(function(noshowType) {
                test('receiveStateShow signal=false with noshowtype=' + noshowType.value + ' applies correct hide mechanism', function(done) {
                    ch5ImportHtmlsnippet.setAttribute('noshowtype', noshowType.value);
                    CrComLib.publishEvent('b', 'set_show_false', true);
                    flush(function() {
                        setTimeout(function() {
                            assert.equal(ch5ImportHtmlsnippet.getAttribute('show'), 'false', 'show attribute should be false');
                            
                            if (noshowType.value === 'remove') {
                                assert.isNull(ch5ImportHtmlsnippet.parentElement, 'Element should be removed from DOM');
                            } else {
                                assert.isTrue(ch5ImportHtmlsnippet.classList.contains(noshowType.hideClass), 'Should have ' + noshowType.hideClass + ' class');
                                assert.isFalse(ch5ImportHtmlsnippet.classList.contains(noshowType.otherClass), 'Should not have ' + noshowType.otherClass + ' class');
                            }
                            done();
                        }, 100);
                    });
                });

                test('receiveStateShow signal=true with noshowtype=' + noshowType.value + ' removes hide mechanism', function(done) {
                    ch5ImportHtmlsnippet.setAttribute('noshowtype', noshowType.value);
                    ch5ImportHtmlsnippet.setAttribute('show', 'false');
                    flush(function() {
                        setTimeout(function() {
                            CrComLib.publishEvent('b', 'set_show_true', true);
                            flush(function() {
                                setTimeout(function() {
                                    assert.equal(ch5ImportHtmlsnippet.getAttribute('show'), 'true', 'show attribute should be true');
                                    
                                    if (noshowType.value === 'remove') {
                                        assert.isNotNull(ch5ImportHtmlsnippet.parentElement, 'Element should be restored to DOM');
                                    } else {
                                        assert.isFalse(ch5ImportHtmlsnippet.classList.contains(noshowType.hideClass), 'Should not have ' + noshowType.hideClass + ' class');
                                        assert.isFalse(ch5ImportHtmlsnippet.classList.contains(noshowType.otherClass), 'Should not have ' + noshowType.otherClass + ' class');
                                    }
                                    done();
                                }, 100);
                            });
                        }, 100);
                    });
                });
            });
        });

            let ch5ImportHtmlsnippet;

            setup(async function() {
                const emulatorJson = await fetch('./emulator/receivestatecustomclass.json').then((response) => response.json());
                emulator = CrComLib.Ch5Emulator.getInstance();
                emulator.loadScenario(emulatorJson);
                ch5ImportHtmlsnippet = fixture('ch5-import-htmlsnippet-receivestatecustomclass-fixture');
            });

            test('receivestatecustomclass attribute is set correctly', function() {
                assert.equal(ch5ImportHtmlsnippet.getAttribute('receivestatecustomclass'), 'signal_custom_class');
            });

            test('signal updates customClass property', function(done) {
                CrComLib.publishEvent('s', 'signal_custom_class', 'dynamic-signal-class');
                flush(function() {
                    setTimeout(function() {
                        assert.equal(ch5ImportHtmlsnippet.customClass, 'dynamic-signal-class', 'customClass property should be updated');
                        done();
                    }, 300);
                });
            });

            test('signal adds class to element classList', function(done) {
                CrComLib.publishEvent('s', 'signal_custom_class', 'dynamic-signal-class');
                flush(function() {
                    setTimeout(function() {
                        assert.isTrue(ch5ImportHtmlsnippet.classList.contains('dynamic-signal-class'), 'Element should have the dynamically assigned class');
                        done();
                    }, 300);
                });
            });

            test('signal updates with new class value', function(done) {
                CrComLib.publishEvent('s', 'signal_custom_class', 'first-class');
                flush(function() {
                    setTimeout(function() {
                        assert.isTrue(ch5ImportHtmlsnippet.classList.contains('first-class'));
                        
                        CrComLib.publishEvent('s', 'signal_custom_class', 'second-class');
                        flush(function() {

                                assert.isFalse(ch5ImportHtmlsnippet.classList.contains('first-class'), 'Old class should be removed');
                                assert.isTrue(ch5ImportHtmlsnippet.classList.contains('second-class'), 'New class should be added');
                                done();
                            }, 300);
                        });
                    }, 300);
                });
            });

            test('signal with empty string clears custom class', function(done) {
                CrComLib.publishEvent('s', 'signal_custom_class', 'temp-class');
                flush(function() {
                    setTimeout(function() {
                        assert.isTrue(ch5ImportHtmlsnippet.classList.contains('temp-class'));
                        
                        CrComLib.publishEvent('s', 'signal_custom_class', '');
                        flush(function() {
                            setTimeout(function() {
                                assert.isFalse(ch5ImportHtmlsnippet.classList.contains('temp-class'), 'Class should be removed when signal is empty');

                            }, 300);

                let sendEventReceived = false;
