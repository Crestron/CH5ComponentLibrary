    <script>
      suite("ch5-template-contract-with-dots", function () {
        let suiteElement = null;
        let ch5Template = null;
        let ch5ButtonContractWithDots = null;
        let ch5ImageContractWithDots = null;

        setup(function () {

              ch5ImageContractWithDots =

              resolve();
            });

          return Promise.all([
            customElements.whenDefined("ch5-template"),
            waitForTimeout,
          ]);

        test("Contract names with dots are preserved", function () {
          assert.strictEqual(

          assert.strictEqual(

          );
        });
      });

    <test-fixture id="ch5-template-with-custom-attributes-fixture">
      <template>
        <template id="template-with-custom-attributes-widget">
          <div class="uses-numeric">
            <span data-ch5-textcontent="1"></span>
            <div data-ch5-show="2" data-ch5-noshow-type="visibility"></div>
          </div>
          <div class="uses-contract">
            <span data-ch5-textcontent="TextContent"></span>
            <div data-ch5-show="Show" data-ch5-noshow-type="visibility"></div>
          </div>
        </template>
        <ch5-template
          templateId="template-with-custom-attributes-widget"
          contractname="My.Contract.Prefix."
          stringjoinoffset="100"
          booleanjoinoffset="200"
        >
        </ch5-template>
      </template>
    </test-fixture>

    <script>
      suite("ch5-template-with-custom-attributes", function () {
        let suiteElement = null;
        let ch5Template = null;
        let usingNumeric = null;
        let usingContract = null;

        setup(function () {
          suiteElement = fixture("ch5-template-with-custom-attributes-fixture");
          ch5Template = suiteElement[1];
          const waitForTimeout = new Promise((resolve) => {
            setTimeout(function () {
              usingNumeric = ch5Template.querySelector("div.uses-numeric");
              usingContract = ch5Template.querySelector("div.uses-contract");
              resolve();
            });
          });

          return Promise.all([
            customElements.whenDefined("ch5-template"),
            waitForTimeout,
          ]);
        });

        test("Increment data-ch5-textcontent", function () {
          const elementName = "span";
          const attributeName = "data-ch5-textcontent";
          const expectedNumericValue = "101";
          const expectedContractValue = "My.Contract.Prefix.TextContent";

          const elementWithAttributeUsingNumeric = usingNumeric.querySelector(
            `${elementName}[${attributeName}]`
          );
          const elementWithAttributeUsingContract = usingContract.querySelector(
            `${elementName}[${attributeName}]`
          );
          assert.strictEqual(
            elementWithAttributeUsingNumeric.getAttribute(`${attributeName}`),
            expectedNumericValue
          );
          assert.strictEqual(
            elementWithAttributeUsingContract.getAttribute(`${attributeName}`),
            expectedContractValue
          );
        });

        test("Verify template element exists and is rendered", function () {
          assert.isNotNull(ch5Template, "ch5-template should exist");
          assert.isNotNull(usingNumeric, "numeric div should be rendered");
          assert.isNotNull(usingContract, "contract div should be rendered");
        });

        test("Verify original template is not modified", function () {
          const originalTemplate = document.querySelector(
            "#template-with-custom-attributes-widget"
          );
          const originalSpan = originalTemplate.content.querySelector(
            "span[data-ch5-textcontent]"
          );
          assert.strictEqual(
            originalSpan.getAttribute("data-ch5-textcontent"),
            "1",
            "Original template should remain unchanged"
          );
        });
        test("Increment data-ch5-show", function () {
          const elementName = "div";
          const attributeName = "data-ch5-show";
          const expectedNumericValue = "202";
          const expectedContractValue = "My.Contract.Prefix.Show";

          const elementWithAttributeUsingNumeric = usingNumeric.querySelector(
            `${elementName}[${attributeName}]`
          );
          const elementWithAttributeUsingContract = usingContract.querySelector(
            `${elementName}[${attributeName}]`
          );
          assert.strictEqual(
            elementWithAttributeUsingNumeric.getAttribute(`${attributeName}`),
            expectedNumericValue
          );
          assert.strictEqual(
            elementWithAttributeUsingContract.getAttribute(`${attributeName}`),
            expectedContractValue
          );
        });

        test("Verify data-ch5-noshow-type is preserved", function () {
          const elementWithAttributeUsingNumeric =
            usingNumeric.querySelector("div[data-ch5-show]");
          const elementWithAttributeUsingContract =
            usingContract.querySelector("div[data-ch5-show]");
          assert.strictEqual(
            elementWithAttributeUsingNumeric.getAttribute(
              "data-ch5-noshow-type"
            ),
            "visibility"
          );
          assert.strictEqual(
            elementWithAttributeUsingContract.getAttribute(
              "data-ch5-noshow-type"
            ),
            "visibility"
          );
        });
      });
    </script>

    <script>
      suite("ch5-template-with-list", function () {
        let suiteElement = null;
        let ch5Template = null;
        let ch5ListUsingNumeric = null;
        let ch5ListUsingContract = null;

        setup(function () {
          suiteElement = fixture("ch5-template-with-list-fixture");
          ch5Template = suiteElement[1];
          const waitForTimeout = new Promise((resolve) => {
            setTimeout(() => {
              ch5ListUsingNumeric = ch5Template.querySelector(
                "ch5-list.uses-numeric"
              );
              ch5ListUsingContract = ch5Template.querySelector(

              );
              resolve();
            });
          });

          return Promise.all([
            customElements.whenDefined("ch5-template"),
            waitForTimeout,
          ]);
        });

        test("Increment button list", function () {
          const numericButtons =
            ch5ListUsingNumeric.querySelectorAll("ch5-button");
          const contractButtons =
            ch5ListUsingContract.querySelectorAll("ch5-button");

          assert.strictEqual(numericButtons.length, 2, "not 2 numeric buttons");
          assert.strictEqual(
            contractButtons.length,
            2,
            "not 2 contract buttons"
          );

          assert.strictEqual(
            numericButtons[1].getAttribute("sendeventonclick"),
            "311",

          );
          assert.strictEqual(
            contractButtons[1].getAttribute("sendeventonclick"),

          );

          assert.strictEqual(
            numericButtons[1].getAttribute("receivestatelabel"),
            "121",
            "numeric receivestatelabel mismatch"
          );
          assert.strictEqual(
            contractButtons[1].getAttribute("receivestatelabel"),
            "My.Contract.Prefix.ButtonLabel[1]",
            "contract receivestatelabel mismatch"
          );

          assert.strictEqual(

          );
          assert.strictEqual(
