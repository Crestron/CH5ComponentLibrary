<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <script src="/webcomponentsjs/webcomponents-lite.js"></script>
    <script src="/bower_components/web-component-tester/browser.js"></script>
    <link rel="stylesheet" type="text/css" href="/wct_tests/themes/crestron-components-assets/base.css">
    <script src="/wct_tests/js/helpers.js"></script>
    <script src="/build_bundles/umd/cr-com-lib.js"></script>
    <script src="/wct_tests/ch5-button/js/helpers.js"></script>
</head>

<body>

    <test-fixture id="ch5-button-multilineSupport-fixture">
        <template>
            <ch5-button></ch5-button>
        </template>
    </test-fixture>

    <test-fixture id="ch5-button-multilineSupport-with-label-fixture">
        <template>
            <ch5-button label="Test Button Label"></ch5-button>
        </template>
    </test-fixture>

    <test-fixture id="ch5-button-multilineSupport-long-text-fixture">
        <template>
            <ch5-button label="This is a very long button label that should wrap to multiple lines when multiline support is enabled"></ch5-button>
        </template>
    </test-fixture>

    <script>
        suite('ch5-button-multilineSupport-attributes', () => {
            let ch5Button;

            setup(async () => {
                ch5Button = fixture('ch5-button-multilineSupport-fixture');
            });

            // Test 1: Default value should be false
            test('Check default value for multilineSupport is false', () => {
                expect(ch5Button.multilineSupport).to.be.false;
            });

            // Test 2: Check attribute value with various inputs
            let attributeTestCases = ['a', '', ' ', 'number', true, false];
            let expectedAttributeResults = ['false', 'true', 'false', 'false', 'true', 'false'];
            
            attributeTestCases.forEach((ele, i) => {
                test(`Check attribute multilineSupport with value "${ele}" sets to "${expectedAttributeResults[i]}"`, () => {
                    ch5Button.setAttribute('multilineSupport', ele);
                    expect(ch5Button.getAttribute('multilineSupport')).to.be.equal(expectedAttributeResults[i]);
                });
            });

            // Test 3: Check property setter and getter
            test('Check property multilineSupport = true', () => {
                ch5Button.setAttribute('multilineSupport', 'true');
                expect(ch5Button.multilineSupport).to.be.true;
                expect(ch5Button.getAttribute('multilineSupport')).to.be.equal('true');
            });

            test('Check property multilineSupport = false', () => {
                ch5Button.setAttribute('multilineSupport', 'false');
                expect(ch5Button.multilineSupport).to.be.false;
                expect(ch5Button.getAttribute('multilineSupport')).to.be.equal('false');
            });

            // Test 4: Toggle multilineSupport property
            test('Check toggling multilineSupport property multiple times', () => {
                ch5Button.multilineSupport = true;
                expect(ch5Button.multilineSupport).to.be.true;
                ch5Button.multilineSupport = false;
                expect(ch5Button.multilineSupport).to.be.false;
                ch5Button.multilineSupport = true;
                expect(ch5Button.multilineSupport).to.be.true;
            });

            // Test 5: Check attribute removal
            test('Check removing multilineSupport attribute', () => {
                ch5Button.setAttribute('multilineSupport', 'true');
                expect(ch5Button.getAttribute('multilineSupport')).to.be.equal('true');
                ch5Button.removeAttribute('multilineSupport');
                expect(ch5Button.getAttribute('multilineSupport')).to.be.null;
            });
        });

        suite('ch5-button-multilineSupport-with-label', () => {
            let ch5Button;

            setup(async () => {
                ch5Button = fixture('ch5-button-multilineSupport-with-label-fixture');
            });

            // Test 6: Check multilineSupport with label present
            test('Check multilineSupport with pre-defined label', () => {
                expect(ch5Button.label).to.equal('Test Button Label');
                ch5Button.multilineSupport = true;
                expect(ch5Button.multilineSupport).to.be.true;
            });

            // Test 7: Check label display with multilineSupport true
            test('Check label is displayed when multilineSupport is true', () => {
                ch5Button.multilineSupport = true;
                expect(ch5Button.label).to.equal('Test Button Label');
            });

            // Test 8: Change multilineSupport and verify label persists
            test('Check label persists when changing multilineSupport', () => {
                const originalLabel = ch5Button.label;
                ch5Button.multilineSupport = true;
                expect(ch5Button.label).to.equal(originalLabel);
                ch5Button.multilineSupport = false;
                expect(ch5Button.label).to.equal(originalLabel);
            });

            // Test 9: Update label with multilineSupport enabled
            test('Check updating label with multilineSupport enabled', () => {
                ch5Button.multilineSupport = true;
                ch5Button.label = 'Updated Button Label';
                expect(ch5Button.label).to.equal('Updated Button Label');
                expect(ch5Button.multilineSupport).to.be.true;
            });

            // Test 10: Update label with multilineSupport disabled
            test('Check updating label with multilineSupport disabled', () => {
                ch5Button.multilineSupport = false;
                ch5Button.label = 'Another Updated Label';
                expect(ch5Button.label).to.equal('Another Updated Label');
                expect(ch5Button.multilineSupport).to.be.false;
            });
        });

        suite('ch5-button-multilineSupport-with-long-text', () => {
            let ch5Button;

            setup(async () => {
                ch5Button = fixture('ch5-button-multilineSupport-long-text-fixture');
            });

            // Test 11: Check multilineSupport enables wrapping for long text
            test('Check multilineSupport with long text label', () => {
                expect(ch5Button.multilineSupport).to.be.false;
                ch5Button.multilineSupport = true;
                expect(ch5Button.multilineSupport).to.be.true;
            });

            // Test 12: Check CSS class application when multilineSupport changes
            test('Check CSS class changes when multilineSupport is enabled', () => {
                ch5Button.multilineSupport = true;
                // Verify multilineSupport is set (CSS class handling is internal)
                expect(ch5Button.multilineSupport).to.be.true;
            });

            // Test 13: Check CSS class removal when multilineSupport is disabled
            test('Check CSS class removal when multilineSupport is disabled', () => {
                ch5Button.multilineSupport = true;
                expect(ch5Button.multilineSupport).to.be.true;
                ch5Button.multilineSupport = false;
                expect(ch5Button.multilineSupport).to.be.false;
            });

            // Test 14: Verify label with very long text
            test('Check label text with multilineSupport and long text', () => {
                const longText = 'This is a very long button label that should wrap to multiple lines when multiline support is enabled';
                expect(ch5Button.label).to.equal(longText);
            });

            // Test 15: Enable multilineSupport and verify label persistence
            test('Check label persists with multilineSupport enabled for long text', () => {
                const originalLabel = ch5Button.label;
                ch5Button.multilineSupport = true;
                expect(ch5Button.label).to.equal(originalLabel);
            });
        });

        suite('ch5-button-multilineSupport-combinations', () => {
            let ch5Button;

            setup(async () => {
                ch5Button = fixture('ch5-button-multilineSupport-fixture');
            });

            // Test 16: Set multilineSupport via setAttribute
            test('Check setting multilineSupport via setAttribute with "true"', () => {
                ch5Button.setAttribute('multilineSupport', 'true');
                expect(ch5Button.multilineSupport).to.be.true;
            });

            // Test 17: Set multilineSupport via setAttribute with "false"
            test('Check setting multilineSupport via setAttribute with "false"', () => {
                ch5Button.setAttribute('multilineSupport', 'false');
                expect(ch5Button.multilineSupport).to.be.false;
            });

            // Test 18: Set multilineSupport via setAttribute with empty string
            test('Check setting multilineSupport via setAttribute with empty string', () => {
                ch5Button.setAttribute('multilineSupport', '');
                expect(ch5Button.getAttribute('multilineSupport')).to.be.equal('true');
            });

            // Test 19: Check multilineSupport with other properties
            test('Check multilineSupport combined with type property', () => {
                ch5Button.setAttribute('type', 'primary');
                ch5Button.multilineSupport = true;
                expect(ch5Button.multilineSupport).to.be.true;
                expect(ch5Button.getAttribute('type')).to.equal('primary');
            });

            // Test 20: Check multilineSupport with size property
            test('Check multilineSupport combined with size property', () => {
                ch5Button.setAttribute('size', 'large');
                ch5Button.multilineSupport = true;
                expect(ch5Button.multilineSupport).to.be.true;
                expect(ch5Button.getAttribute('size')).to.equal('large');
            });

            // Test 21: Check multilineSupport with shape property
            test('Check multilineSupport combined with shape property', () => {
                ch5Button.setAttribute('shape', 'circle');
                ch5Button.multilineSupport = true;
                expect(ch5Button.multilineSupport).to.be.true;
                expect(ch5Button.getAttribute('shape')).to.equal('circle');
            });

            // Test 22: Check multilineSupport with stretch property
            test('Check multilineSupport combined with stretch property', () => {
                ch5Button.setAttribute('stretch', 'both');
                ch5Button.multilineSupport = true;
                expect(ch5Button.multilineSupport).to.be.true;
                expect(ch5Button.getAttribute('stretch')).to.equal('both');
            });

            // Test 23: Check multilineSupport with hAlignLabel property
            test('Check multilineSupport combined with hAlignLabel property', () => {
                ch5Button.setAttribute('hAlignLabel', 'left');
                ch5Button.multilineSupport = true;
                expect(ch5Button.multilineSupport).to.be.true;
                expect(ch5Button.getAttribute('hAlignLabel')).to.equal('left');
            });

            // Test 24: Check multilineSupport with vAlignLabel property
            test('Check multilineSupport combined with vAlignLabel property', () => {
                ch5Button.setAttribute('vAlignLabel', 'top');
                ch5Button.multilineSupport = true;
                expect(ch5Button.multilineSupport).to.be.true;
                expect(ch5Button.getAttribute('vAlignLabel')).to.equal('top');
            });

            // Test 25: Check multilineSupport remains after other property changes
            test('Check multilineSupport persists after changing other properties', () => {
                ch5Button.multilineSupport = true;
                ch5Button.setAttribute('type', 'success');
                expect(ch5Button.multilineSupport).to.be.true;
                ch5Button.setAttribute('size', 'small');
                expect(ch5Button.multilineSupport).to.be.true;
            });
        });

        suite('ch5-button-multilineSupport-css-classes', () => {
            let ch5Button;

            setup(async () => {
                ch5Button = fixture('ch5-button-multilineSupport-with-label-fixture');
                await new Promise(resolve => setTimeout(resolve, 100));
            });

            // Test 26: Check CSS class when multilineSupport is false (default)
            test('Check ch5-button--label-multiline-support-false class is applied by default', (done) => {
                flush(() => {
                    setTimeout(() => {
                        const labelSpan = ch5Button.querySelector('.ch5-button--label');
                        if (labelSpan) {
                            expect(labelSpan.classList.contains('ch5-button--label-multiline-support-false')).to.be.true;
                        }
                        done();
                    }, 200);
                });
            });

            // Test 27: Check CSS class when multilineSupport is set to true
            test('Check ch5-button--label-multiline-support-true class is applied when enabled', (done) => {
                ch5Button.multilineSupport = true;
                flush(() => {
                    setTimeout(() => {
                        const labelSpan = ch5Button.querySelector('.ch5-button--label');
                        if (labelSpan) {
                            expect(labelSpan.classList.contains('ch5-button--label-multiline-support-true')).to.be.true;
                            expect(labelSpan.classList.contains('ch5-button--label-multiline-support-false')).to.be.false;
                        }
                        done();
                    }, 200);
                });
            });

            // Test 28: Check CSS class removal when multilineSupport is set to false
            test('Check ch5-button--label-multiline-support-false class is applied when disabled', (done) => {
                ch5Button.multilineSupport = true;
                flush(() => {
                    setTimeout(() => {
                        ch5Button.multilineSupport = false;
                        setTimeout(() => {
                            const labelSpan = ch5Button.querySelector('.ch5-button--label');
                            if (labelSpan) {
                                expect(labelSpan.classList.contains('ch5-button--label-multiline-support-false')).to.be.true;
                                expect(labelSpan.classList.contains('ch5-button--label-multiline-support-true')).to.be.false;
                            }
                            done();
                        }, 200);
                    }, 200);
                });
            });

            // Test 29: Check CSS class toggle between true and false
            test('Check CSS class changes correctly when toggling multilineSupport', (done) => {
                ch5Button.multilineSupport = true;
                flush(() => {
                    setTimeout(() => {
                        const labelSpan = ch5Button.querySelector('.ch5-button--label');
                        if (labelSpan) {
                            expect(labelSpan.classList.contains('ch5-button--label-multiline-support-true')).to.be.true;
                        }
                        ch5Button.multilineSupport = false;
                        setTimeout(() => {
                            if (labelSpan) {
                                expect(labelSpan.classList.contains('ch5-button--label-multiline-support-false')).to.be.true;
                            }
                            ch5Button.multilineSupport = true;
                            setTimeout(() => {
                                if (labelSpan) {
                                    expect(labelSpan.classList.contains('ch5-button--label-multiline-support-true')).to.be.true;
                                }
                                done();
                            }, 200);
                        }, 200);
                    }, 200);
                });
            });

            // Test 30: Check only one multilineSupport class exists at a time
            test('Check only one multilineSupport CSS class is present at any time', (done) => {
                ch5Button.multilineSupport = true;
                flush(() => {
                    setTimeout(() => {
                        const labelSpan = ch5Button.querySelector('.ch5-button--label');
                        if (labelSpan) {
                            const hasTrue = labelSpan.classList.contains('ch5-button--label-multiline-support-true');
                            const hasFalse = labelSpan.classList.contains('ch5-button--label-multiline-support-false');
                            expect(hasTrue && !hasFalse).to.be.true;
                        }
                        done();
                    }, 200);
                });
            });

            // Test 31: Check CSS class with setAttribute
            test('Check CSS class is applied when using setAttribute', (done) => {
                ch5Button.setAttribute('multilineSupport', 'true');
                flush(() => {
                    setTimeout(() => {
                        const labelSpan = ch5Button.querySelector('.ch5-button--label');
                        if (labelSpan) {
                            expect(labelSpan.classList.contains('ch5-button--label-multiline-support-true')).to.be.true;
                        }
                        done();
                    }, 200);
                });
            });

            // Test 32: Check CSS class persists with label changes
            test('Check CSS class persists when label is updated', (done) => {
                ch5Button.multilineSupport = true;
                flush(() => {
                    setTimeout(() => {
                        ch5Button.label = 'New Label Text';
                        setTimeout(() => {
                            const labelSpan = ch5Button.querySelector('.ch5-button--label');
                            if (labelSpan) {
                                expect(labelSpan.classList.contains('ch5-button--label-multiline-support-true')).to.be.true;
                            }
                            done();
                        }, 200);
                    }, 200);
                });
            });
        });

    </script>
</body>

</html>
