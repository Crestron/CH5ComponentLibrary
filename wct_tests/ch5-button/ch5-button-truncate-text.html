<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <script src="/webcomponentsjs/webcomponents-lite.js"></script>
    <script src="/bower_components/web-component-tester/browser.js"></script>
    <link rel="stylesheet" type="text/css" href="/wct_tests/themes/crestron-components-assets/base.css">
    <script src="/wct_tests/js/helpers.js"></script>
    <script src="/build_bundles/umd/cr-com-lib.js"></script>
    <script src="/wct_tests/ch5-button/js/helpers.js"></script>
</head>

<body>

    <test-fixture id="ch5-button-truncateText-fixture">
        <template>
            <ch5-button></ch5-button>
        </template>
    </test-fixture>

    <test-fixture id="ch5-button-truncateText-with-label-fixture">
        <template>
            <ch5-button label="Test Button Label"></ch5-button>
        </template>
    </test-fixture>

    <test-fixture id="ch5-button-truncateText-long-text-fixture">
        <template>
            <ch5-button label="This is a very long button label that exceeds the normal width and should be truncated with ellipsis"></ch5-button>
        </template>
    </test-fixture>

    <script>
        suite('ch5-button-truncateText-attributes', () => {
            let ch5Button;

            setup(async () => {
                ch5Button = fixture('ch5-button-truncateText-fixture');
            });

            // Test 1: Default value should be false
            test('Check default value for truncateText is false', () => {
                expect(ch5Button.truncateText).to.be.false;
            });

            // Test 2: Check attribute value with various inputs
            let attributeTestCases = ['a', '', ' ', 'number', true, false];
            let expectedAttributeResults = ['false', 'true', 'false', 'false', 'true', 'false'];
            
            attributeTestCases.forEach((ele, i) => {
                test(`Check attribute truncateText with value "${ele}" sets to "${expectedAttributeResults[i]}"`, () => {
                    ch5Button.setAttribute('truncateText', ele);
                    expect(ch5Button.getAttribute('truncateText')).to.be.equal(expectedAttributeResults[i]);
                });
            });

            // Test 3: Check property setter and getter
            test('Check property truncateText = true', () => {
                ch5Button.setAttribute('truncateText', 'true');
                expect(ch5Button.truncateText).to.be.true;
                expect(ch5Button.getAttribute('truncateText')).to.be.equal('true');
            });

            test('Check property truncateText = false', () => {
                ch5Button.setAttribute('truncateText', 'false');
                expect(ch5Button.truncateText).to.be.false;
                expect(ch5Button.getAttribute('truncateText')).to.be.equal('false');
            });

            // Test 4: Toggle truncateText property
            test('Check toggling truncateText property multiple times', () => {
                ch5Button.truncateText = true;
                expect(ch5Button.truncateText).to.be.true;
                ch5Button.truncateText = false;
                expect(ch5Button.truncateText).to.be.false;
                ch5Button.truncateText = true;
                expect(ch5Button.truncateText).to.be.true;
            });

            // Test 5: Check attribute removal
            test('Check removing truncateText attribute', () => {
                ch5Button.setAttribute('truncateText', 'true');
                expect(ch5Button.getAttribute('truncateText')).to.be.equal('true');
                ch5Button.removeAttribute('truncateText');
                expect(ch5Button.getAttribute('truncateText')).to.be.null;
            });
        });

        suite('ch5-button-truncateText-with-label', () => {
            let ch5Button;

            setup(async () => {
                ch5Button = fixture('ch5-button-truncateText-with-label-fixture');
            });

            // Test 6: Check truncateText with label present
            test('Check truncateText with pre-defined label', () => {
                expect(ch5Button.label).to.equal('Test Button Label');
                ch5Button.truncateText = true;
                expect(ch5Button.truncateText).to.be.true;
            });

            // Test 7: Check label display with truncateText true
            test('Check label is displayed when truncateText is true', () => {
                ch5Button.truncateText = true;
                expect(ch5Button.label).to.equal('Test Button Label');
            });

            // Test 8: Change truncateText and verify label persists
            test('Check label persists when changing truncateText', () => {
                const originalLabel = ch5Button.label;
                ch5Button.truncateText = true;
                expect(ch5Button.label).to.equal(originalLabel);
                ch5Button.truncateText = false;
                expect(ch5Button.label).to.equal(originalLabel);
            });

            // Test 9: Update label with truncateText enabled
            test('Check updating label with truncateText enabled', () => {
                ch5Button.truncateText = true;
                ch5Button.label = 'Updated Button Label';
                expect(ch5Button.label).to.equal('Updated Button Label');
                expect(ch5Button.truncateText).to.be.true;
            });

            // Test 10: Update label with truncateText disabled
            test('Check updating label with truncateText disabled', () => {
                ch5Button.truncateText = false;
                ch5Button.label = 'Another Updated Label';
                expect(ch5Button.label).to.equal('Another Updated Label');
                expect(ch5Button.truncateText).to.be.false;
            });
        });

        suite('ch5-button-truncateText-with-long-text', () => {
            let ch5Button;

            setup(async () => {
                ch5Button = fixture('ch5-button-truncateText-long-text-fixture');
            });

            // Test 11: Check truncateText with long text label
            test('Check truncateText with long text label', () => {
                expect(ch5Button.truncateText).to.be.false;
                ch5Button.truncateText = true;
                expect(ch5Button.truncateText).to.be.true;
            });

            // Test 12: Check CSS class application when truncateText changes
            test('Check CSS class changes when truncateText is enabled', () => {
                ch5Button.truncateText = true;
                // Verify truncateText is set (CSS class handling is internal)
                expect(ch5Button.truncateText).to.be.true;
            });

            // Test 13: Check CSS class removal when truncateText is disabled
            test('Check CSS class removal when truncateText is disabled', () => {
                ch5Button.truncateText = true;
                expect(ch5Button.truncateText).to.be.true;
                ch5Button.truncateText = false;
                expect(ch5Button.truncateText).to.be.false;
            });

            // Test 14: Verify label with very long text
            test('Check label text with truncateText and long text', () => {
                const longText = 'This is a very long button label that exceeds the normal width and should be truncated with ellipsis';
                expect(ch5Button.label).to.equal(longText);
            });

            // Test 15: Enable truncateText and verify label persistence
            test('Check label persists with truncateText enabled for long text', () => {
                const originalLabel = ch5Button.label;
                ch5Button.truncateText = true;
                expect(ch5Button.label).to.equal(originalLabel);
            });

            // Test 16: Disable truncateText and verify label still present
            test('Check label persists with truncateText disabled', () => {
                const originalLabel = ch5Button.label;
                ch5Button.truncateText = false;
                expect(ch5Button.label).to.equal(originalLabel);
            });
        });

        suite('ch5-button-truncateText-combinations', () => {
            let ch5Button;

            setup(async () => {
                ch5Button = fixture('ch5-button-truncateText-fixture');
            });

            // Test 17: Set truncateText via setAttribute
            test('Check setting truncateText via setAttribute with "true"', () => {
                ch5Button.setAttribute('truncateText', 'true');
                expect(ch5Button.truncateText).to.be.true;
            });

            // Test 18: Set truncateText via setAttribute with "false"
            test('Check setting truncateText via setAttribute with "false"', () => {
                ch5Button.setAttribute('truncateText', 'false');
                expect(ch5Button.truncateText).to.be.false;
            });

            // Test 19: Set truncateText via setAttribute with empty string
            test('Check setting truncateText via setAttribute with empty string', () => {
                ch5Button.setAttribute('truncateText', '');
                expect(ch5Button.getAttribute('truncateText')).to.be.equal('true');
            });

            // Test 20: Check truncateText with type property
            test('Check truncateText combined with type property', () => {
                ch5Button.setAttribute('type', 'danger');
                ch5Button.truncateText = true;
                expect(ch5Button.truncateText).to.be.true;
                expect(ch5Button.getAttribute('type')).to.equal('danger');
            });

            // Test 21: Check truncateText with size property
            test('Check truncateText combined with size property', () => {
                ch5Button.setAttribute('size', 'x-large');
                ch5Button.truncateText = true;
                expect(ch5Button.truncateText).to.be.true;
                expect(ch5Button.getAttribute('size')).to.equal('x-large');
            });

            // Test 22: Check truncateText with shape property
            test('Check truncateText combined with shape property', () => {
                ch5Button.setAttribute('shape', 'oval');
                ch5Button.truncateText = true;
                expect(ch5Button.truncateText).to.be.true;
                expect(ch5Button.getAttribute('shape')).to.equal('oval');
            });

            // Test 23: Check truncateText with stretch property
            test('Check truncateText combined with stretch property', () => {
                ch5Button.setAttribute('stretch', 'width');
                ch5Button.truncateText = true;
                expect(ch5Button.truncateText).to.be.true;
                expect(ch5Button.getAttribute('stretch')).to.equal('width');
            });

            // Test 24: Check truncateText with hAlignLabel property
            test('Check truncateText combined with hAlignLabel property', () => {
                ch5Button.setAttribute('hAlignLabel', 'right');
                ch5Button.truncateText = true;
                expect(ch5Button.truncateText).to.be.true;
                expect(ch5Button.getAttribute('hAlignLabel')).to.equal('right');
            });

            // Test 25: Check truncateText with vAlignLabel property
            test('Check truncateText combined with vAlignLabel property', () => {
                ch5Button.setAttribute('vAlignLabel', 'bottom');
                ch5Button.truncateText = true;
                expect(ch5Button.truncateText).to.be.true;
                expect(ch5Button.getAttribute('vAlignLabel')).to.equal('bottom');
            });

            // Test 26: Check truncateText remains after other property changes
            test('Check truncateText persists after changing other properties', () => {
                ch5Button.truncateText = true;
                ch5Button.setAttribute('type', 'warning');
                expect(ch5Button.truncateText).to.be.true;
                ch5Button.setAttribute('size', 'small');
                expect(ch5Button.truncateText).to.be.true;
            });

            // Test 27: Toggle between multilineSupport and truncateText
            test('Check toggling between truncateText states', () => {
                ch5Button.truncateText = true;
                expect(ch5Button.truncateText).to.be.true;
                ch5Button.truncateText = false;
                expect(ch5Button.truncateText).to.be.false;
                ch5Button.truncateText = true;
                expect(ch5Button.truncateText).to.be.true;
            });
        });

        suite('ch5-button-truncateText-edge-cases', () => {
            let ch5Button;

            setup(async () => {
                ch5Button = fixture('ch5-button-truncateText-fixture');
            });

            // Test 28: Check truncateText with null value
            test('Check truncateText property handles null gracefully', () => {
                ch5Button.truncateText = false;
                expect(ch5Button.truncateText).to.be.false;
            });

            // Test 29: Check truncateText with undefined value
            test('Check truncateText property persists with value changes', () => {
                ch5Button.truncateText = true;
                const currentValue = ch5Button.truncateText;
                expect(currentValue).to.be.true;
            });

            // Test 30: Check multiple setAttribute calls
            test('Check multiple setAttribute calls for truncateText', () => {
                ch5Button.setAttribute('truncateText', 'true');
                expect(ch5Button.getAttribute('truncateText')).to.be.equal('true');
                ch5Button.setAttribute('truncateText', 'false');
                expect(ch5Button.getAttribute('truncateText')).to.be.equal('false');
                ch5Button.setAttribute('truncateText', 'true');
                expect(ch5Button.getAttribute('truncateText')).to.be.equal('true');
            });

            // Test 31: Check truncateText attribute is observable
            test('Check truncateText changes reflect correctly', () => {
                ch5Button.setAttribute('truncateText', 'true');
                expect(ch5Button.truncateText).to.be.true;
                expect(ch5Button.getAttribute('truncateText')).to.be.equal('true');
            });

            // Test 32: Check truncateText with various button types
            test('Check truncateText with button type info', () => {
                ch5Button.setAttribute('type', 'info');
                ch5Button.truncateText = true;
                expect(ch5Button.truncateText).to.be.true;
                expect(ch5Button.getAttribute('type')).to.equal('info');
            });

            // Test 33: Check truncateText with secondary type
            test('Check truncateText with button type secondary', () => {
                ch5Button.setAttribute('type', 'secondary');
                ch5Button.truncateText = true;
                expect(ch5Button.truncateText).to.be.true;
                expect(ch5Button.getAttribute('type')).to.equal('secondary');
            });
        });

        suite('ch5-button-truncateText-css-classes', () => {
            let ch5Button;

            setup(async () => {
                ch5Button = fixture('ch5-button-truncateText-with-label-fixture');
                await new Promise(resolve => setTimeout(resolve, 100));
            });

            // Test 34: Check CSS class when truncateText is false (default)
            test('Check ch5-button--label-truncate-text-false class is applied by default', (done) => {
                flush(() => {
                    setTimeout(() => {
                        const labelSpan = ch5Button.querySelector('.ch5-button--label');
                        if (labelSpan) {
                            expect(labelSpan.classList.contains('ch5-button--label-truncate-text-false')).to.be.true;
                        }
                        done();
                    }, 200);
                });
            });

            // Test 35: Check CSS class when truncateText is set to true
            test('Check ch5-button--label-truncate-text-true class is applied when enabled', (done) => {
                ch5Button.truncateText = true;
                flush(() => {
                    setTimeout(() => {
                        const labelSpan = ch5Button.querySelector('.ch5-button--label');
                        if (labelSpan) {
                            expect(labelSpan.classList.contains('ch5-button--label-truncate-text-true')).to.be.true;
                            expect(labelSpan.classList.contains('ch5-button--label-truncate-text-false')).to.be.false;
                        }
                        done();
                    }, 200);
                });
            });

            // Test 36: Check CSS class removal when truncateText is set to false
            test('Check ch5-button--label-truncate-text-false class is applied when disabled', (done) => {
                ch5Button.truncateText = true;
                flush(() => {
                    setTimeout(() => {
                        ch5Button.truncateText = false;
                        setTimeout(() => {
                            const labelSpan = ch5Button.querySelector('.ch5-button--label');
                            if (labelSpan) {
                                expect(labelSpan.classList.contains('ch5-button--label-truncate-text-false')).to.be.true;
                                expect(labelSpan.classList.contains('ch5-button--label-truncate-text-true')).to.be.false;
                            }
                            done();
                        }, 200);
                    }, 200);
                });
            });

            // Test 37: Check CSS class toggle between true and false
            test('Check CSS class changes correctly when toggling truncateText', (done) => {
                ch5Button.truncateText = true;
                flush(() => {
                    setTimeout(() => {
                        const labelSpan = ch5Button.querySelector('.ch5-button--label');
                        if (labelSpan) {
                            expect(labelSpan.classList.contains('ch5-button--label-truncate-text-true')).to.be.true;
                        }
                        ch5Button.truncateText = false;
                        setTimeout(() => {
                            if (labelSpan) {
                                expect(labelSpan.classList.contains('ch5-button--label-truncate-text-false')).to.be.true;
                            }
                            ch5Button.truncateText = true;
                            setTimeout(() => {
                                if (labelSpan) {
                                    expect(labelSpan.classList.contains('ch5-button--label-truncate-text-true')).to.be.true;
                                }
                                done();
                            }, 200);
                        }, 200);
                    }, 200);
                });
            });

            // Test 38: Check only one truncateText class exists at a time
            test('Check only one truncateText CSS class is present at any time', (done) => {
                ch5Button.truncateText = true;
                flush(() => {
                    setTimeout(() => {
                        const labelSpan = ch5Button.querySelector('.ch5-button--label');
                        if (labelSpan) {
                            const hasTrue = labelSpan.classList.contains('ch5-button--label-truncate-text-true');
                            const hasFalse = labelSpan.classList.contains('ch5-button--label-truncate-text-false');
                            expect(hasTrue && !hasFalse).to.be.true;
                        }
                        done();
                    }, 200);
                });
            });

            // Test 39: Check CSS class with setAttribute
            test('Check CSS class is applied when using setAttribute', (done) => {
                ch5Button.setAttribute('truncateText', 'true');
                flush(() => {
                    setTimeout(() => {
                        const labelSpan = ch5Button.querySelector('.ch5-button--label');
                        if (labelSpan) {
                            expect(labelSpan.classList.contains('ch5-button--label-truncate-text-true')).to.be.true;
                        }
                        done();
                    }, 200);
                });
            });

            // Test 40: Check CSS class persists with label changes
            test('Check CSS class persists when label is updated', (done) => {
                ch5Button.truncateText = true;
                flush(() => {
                    setTimeout(() => {
                        ch5Button.label = 'New Label Text';
                        setTimeout(() => {
                            const labelSpan = ch5Button.querySelector('.ch5-button--label');
                            if (labelSpan) {
                                expect(labelSpan.classList.contains('ch5-button--label-truncate-text-true')).to.be.true;
                            }
                            done();
                        }, 200);
                    }, 200);
                });
            });

            // Test 41: Check CSS class with long text fixture
            test('Check CSS class is correctly applied with long text', (done) => {
                const longTextButton = fixture('ch5-button-truncateText-long-text-fixture');
                longTextButton.truncateText = true;
                flush(() => {
                    setTimeout(() => {
                        const labelSpan = longTextButton.querySelector('.ch5-button--label');
                        if (labelSpan) {
                            expect(labelSpan.classList.contains('ch5-button--label-truncate-text-true')).to.be.true;
                        }
                        done();
                    }, 200);
                });
            });
        });

    </script>
</body>

</html>
