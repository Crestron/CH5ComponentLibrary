<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <script src="/webcomponentsjs/webcomponents-lite.js"></script>
    <script src="/bower_components/web-component-tester/browser.js"></script>
    <link rel="stylesheet" type="text/css" href="/wct_tests/themes/crestron-components-assets/base.css">
    <script src="/wct_tests/js/helpers.js"></script>
    <script src="/build_bundles/umd/cr-com-lib.js"></script>
</head>

<body>
    <test-fixture id="ch5-qrcode-receiveStateShow-fixture">
        <template>
            <ch5-qrcode receiveStateShow="receive_show_signal" qrCode="Test QR Code"></ch5-qrcode>
        </template>
    </test-fixture>

    <test-fixture id="ch5-qrcode-receiveStateShow-default-fixture">
        <template>
            <ch5-qrcode qrCode="Test QR Code"></ch5-qrcode>
        </template>
    </test-fixture>

    <script>
        suite('ch5-qrcode-receiveStateShow-attributes-value', () => {
            let ch5QrCode;

            setup(async () => {
                const emulatorJson = await fetch('./emulator/receivestateshow.json').then((response) => response.json());
                const emulator = CrComLib.Ch5Emulator.getInstance();
                emulator.loadScenario(emulatorJson);
                ch5QrCode = fixture('ch5-qrcode-receiveStateShow-fixture');
            });

            test('receiveStateShow attribute should be set correctly', () => {
                expect(ch5QrCode.getAttribute('receiveStateShow')).to.be.equal('receive_show_signal');
            });

            test('receiveStateShow should show element when true', (done) => {
                CrComLib.publishEvent('b', 'set_show_true', true);
                flush(() => {
                    setTimeout(() => {
                        expect(ch5QrCode.getAttribute('show')).to.be.equal('true');
                        done();
                    }, 100);
                });
            });

            test('receiveStateShow should hide element when false', (done) => {
                CrComLib.publishEvent('b', 'set_show_false', true);
                flush(() => {
                    setTimeout(() => {
                        expect(ch5QrCode.getAttribute('show')).to.be.equal('false');
                        done();
                    }, 100);
                });
            });
        });

        suite('ch5-qrcode-receiveStateShow-default-value', () => {
            let ch5QrCode;

            setup(() => {
                ch5QrCode = fixture('ch5-qrcode-receiveStateShow-default-fixture');
                return Promise.all([customElements.whenDefined('ch5-qrcode')]);
            });

            test('receiveStateShow should be undefined by default', () => {
                expect(ch5QrCode.getAttribute('receiveStateShow')).to.be.null;
            });

            test('show attribute default value should be true', () => {
                expect(ch5QrCode.getAttribute('show')).to.be.null;
            });
        });

        suite('ch5-qrcode-receiveStateShow-dynamic-update', () => {
            let ch5QrCode;

            setup(() => {
                ch5QrCode = fixture('ch5-qrcode-receiveStateShow-default-fixture');
                return Promise.all([customElements.whenDefined('ch5-qrcode')]);
            });

            test('receiveStateShow can be set dynamically', (done) => {
                ch5QrCode.setAttribute('receiveStateShow', 'new_signal');
                flush(() => {
                    setTimeout(() => {
                        expect(ch5QrCode.getAttribute('receiveStateShow')).to.be.equal('new_signal');
                        done();
                    }, 100);
                });
            });
        });
    </script>
</body>

</html>
