<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <script src="/webcomponentsjs/webcomponents-lite.js"></script>
    <script src="/bower_components/web-component-tester/browser.js"></script>
    <link rel="stylesheet" type="text/css" href="/wct_tests/themes/crestron-components-assets/base.css">
    <script src="/wct_tests/js/helpers.js"></script>
    <script src="/build_bundles/umd/cr-com-lib.js"></script>
</head>

<body>

    <test-fixture id="ch5-qrcode-default-fixture">
        <template>
            <ch5-qrcode></ch5-qrcode>
        </template>
    </test-fixture>

    <test-fixture id="ch5-qrcode-qrcode-fixture">
        <template>
            <ch5-qrcode qrCode="https://www.example.com"></ch5-qrcode>
        </template>
    </test-fixture>

    <test-fixture id="ch5-qrcode-qrcode-empty-fixture">
        <template>
            <ch5-qrcode qrCode=""></ch5-qrcode>
        </template>
    </test-fixture>

    <test-fixture id="ch5-qrcode-qrcode-special-chars-fixture">
        <template>
            <ch5-qrcode qrCode="Test@#$%^&*()_+"></ch5-qrcode>
        </template>
    </test-fixture>

    <test-fixture id="ch5-qrcode-qrcode-long-text-fixture">
        <template>
            <ch5-qrcode qrCode="This is a very long text that will be encoded into the QR code to test the component's ability to handle large amounts of data. QR codes can store up to 4296 alphanumeric characters."></ch5-qrcode>
        </template>
    </test-fixture>

    <test-fixture id="ch5-qrcode-qrcode-numeric-fixture">
        <template>
            <ch5-qrcode qrCode="1234567890"></ch5-qrcode>
        </template>
    </test-fixture>

    <test-fixture id="ch5-qrcode-qrcode-unicode-fixture">
        <template>
            <ch5-qrcode qrCode="Hello World! 你好世界"></ch5-qrcode>
        </template>
    </test-fixture>

    <script>
        suite('ch5-qrcode qrCode default', () => {
            let ch5QrCode;

            setup(() => {
                ch5QrCode = fixture('ch5-qrcode-default-fixture');
                return Promise.all([customElements.whenDefined('ch5-qrcode')]);
            });

            test('qrCode default value should be empty string', () => {
                expect(ch5QrCode.qrCode).to.be.equal('');
            });
        });

        suite('ch5-qrcode qrCode with value', () => {
            let ch5QrCode;

            setup(() => {
                ch5QrCode = fixture('ch5-qrcode-qrcode-fixture');
                return Promise.all([customElements.whenDefined('ch5-qrcode')]);
            });

            test('qrCode value should be "https://www.example.com"', () => {
                expect(ch5QrCode.qrCode).to.be.equal('https://www.example.com');
            });

            test('qrCode canvas should be rendered', (done) => {
                flush(() => {
                    setTimeout(() => {
                        const canvasElm = ch5QrCode.querySelector('canvas');
                        expect(canvasElm).to.not.be.null;
                        done();
                    }, 100);
                });
            });
        });

        suite('ch5-qrcode qrCode empty value', () => {
            let ch5QrCode;

            setup(() => {
                ch5QrCode = fixture('ch5-qrcode-qrcode-empty-fixture');
                return Promise.all([customElements.whenDefined('ch5-qrcode')]);
            });

            test('qrCode empty value should be empty string', () => {
                expect(ch5QrCode.qrCode).to.be.equal('');
            });
        });

        suite('ch5-qrcode qrCode special characters', () => {
            let ch5QrCode;

            setup(() => {
                ch5QrCode = fixture('ch5-qrcode-qrcode-special-chars-fixture');
                return Promise.all([customElements.whenDefined('ch5-qrcode')]);
            });

            test('qrCode with special characters', () => {
                expect(ch5QrCode.qrCode).to.be.equal('Test@#$%^&*()_+');
            });

            test('qrCode canvas should be rendered for special characters', (done) => {
                flush(() => {
                    setTimeout(() => {
                        const canvasElm = ch5QrCode.querySelector('canvas');
                        expect(canvasElm).to.not.be.null;
                        done();
                    }, 100);
                });
            });
        });

        suite('ch5-qrcode qrCode long text', () => {
            let ch5QrCode;

            setup(() => {
                ch5QrCode = fixture('ch5-qrcode-qrcode-long-text-fixture');
                return Promise.all([customElements.whenDefined('ch5-qrcode')]);
            });

            test('qrCode with long text', () => {
                expect(ch5QrCode.qrCode).to.include('This is a very long text');
            });

            test('qrCode canvas should be rendered for long text', (done) => {
                flush(() => {
                    setTimeout(() => {
                        const canvasElm = ch5QrCode.querySelector('canvas');
                        expect(canvasElm).to.not.be.null;
                        done();
                    }, 100);
                });
            });
        });

        suite('ch5-qrcode qrCode numeric', () => {
            let ch5QrCode;

            setup(() => {
                ch5QrCode = fixture('ch5-qrcode-qrcode-numeric-fixture');
                return Promise.all([customElements.whenDefined('ch5-qrcode')]);
            });

            test('qrCode with numeric value', () => {
                expect(ch5QrCode.qrCode).to.be.equal('1234567890');
            });
        });

        suite('ch5-qrcode qrCode unicode', () => {
            let ch5QrCode;

            setup(() => {
                ch5QrCode = fixture('ch5-qrcode-qrcode-unicode-fixture');
                return Promise.all([customElements.whenDefined('ch5-qrcode')]);
            });

            test('qrCode with unicode characters', () => {
                expect(ch5QrCode.qrCode).to.be.equal('Hello World! 你好世界');
            });
        });

        suite('ch5-qrcode qrCode dynamic update', () => {
            let ch5QrCode;

            setup(() => {
                ch5QrCode = fixture('ch5-qrcode-default-fixture');
                return Promise.all([customElements.whenDefined('ch5-qrcode')]);
            });

            test('qrCode can be set dynamically via attribute', (done) => {
                ch5QrCode.setAttribute('qrCode', 'Dynamic Value');
                flush(() => {
                    setTimeout(() => {
                        expect(ch5QrCode.getAttribute('qrCode')).to.be.equal('Dynamic Value');
                        expect(ch5QrCode.qrCode).to.be.equal('Dynamic Value');
                        done();
                    }, 100);
                });
            });

            test('qrCode can be set dynamically via property', (done) => {
                ch5QrCode.qrCode = 'Property Value';
                flush(() => {
                    setTimeout(() => {
                        expect(ch5QrCode.qrCode).to.be.equal('Property Value');
                        done();
                    }, 100);
                });
            });

            test('qrCode can be updated multiple times', (done) => {
                ch5QrCode.qrCode = 'First Value';
                flush(() => {
                    setTimeout(() => {
                        expect(ch5QrCode.qrCode).to.be.equal('First Value');
                        ch5QrCode.qrCode = 'Second Value';
                        flush(() => {
                            setTimeout(() => {
                                expect(ch5QrCode.qrCode).to.be.equal('Second Value');
                                done();
                            }, 100);
                        });
                    }, 100);
                });
            });
        });
    </script>
</body>

</html>
